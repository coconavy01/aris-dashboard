<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100vw}
:root{
  --bg:#060608;--s1:#0c0e14;--s2:#111420;--s3:#161926;
  --purple:#6366f1;--purple-d:rgba(99,102,241,.12);--purple-g:rgba(99,102,241,.25);
  --green:#10b981;--green-d:rgba(16,185,129,.1);
  --red:#f43f5e;--red-d:rgba(244,63,94,.1);
  --amber:#f59e0b;--amber-d:rgba(245,158,11,.1);
  --blue:#38bdf8;--border2:rgba(255,255,255,.05);
  --txt:#f1f5f9;--txt-mid:#94a3b8;--txt-dim:#475569;--radius:8px;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(99,102,241,.06),transparent);pointer-events:none;z-index:0}
/* SIDEBAR */
.sidebar{width:256px;min-width:256px;background:var(--s1);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:relative;z-index:20;overflow:hidden}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--purple-g),transparent)}
.sb-top{padding:20px 18px 16px;border-bottom:1px solid var(--border2)}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,var(--purple),#8b5cf6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0;box-shadow:0 0 20px rgba(99,102,241,.3)}
.logo-name{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.4px}
.logo-sub{font-size:8.5px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace}
.live-pill{display:flex;align-items:center;gap:6px;margin-top:12px;padding:6px 11px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);font-size:9.5px;font-family:'DM Mono',monospace;color:var(--green);letter-spacing:.5px;border-radius:20px}
.live-dot{width:5px;height:5px;background:var(--green);border-radius:50%;box-shadow:0 0 6px rgba(16,185,129,.7);animation:ping 1.5s ease infinite;flex-shrink:0}
@keyframes ping{0%,100%{opacity:1}50%{opacity:.4}}
.sb-nav{padding:12px 10px 6px}
.nav-sect{font-size:8.5px;letter-spacing:2px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;padding:0 10px;margin-bottom:5px}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;transition:all .15s;color:var(--txt-dim);font-size:12.5px;font-weight:500;text-decoration:none;border-radius:6px;margin-bottom:1px}
.nav-btn:hover{background:rgba(255,255,255,.05);color:var(--txt)}
.nav-btn.active{background:rgba(99,102,241,.15);color:#a5b4fc;box-shadow:inset 3px 0 0 var(--purple)}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sb-accs{flex:1;overflow-y:auto;padding:4px 10px 10px}
.acc-item{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;transition:all .15s;margin-bottom:1px;color:var(--txt-dim);font-size:12px;font-weight:500;border-radius:6px}
.acc-item:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.acc-item.active{background:rgba(99,102,241,.12);color:#a5b4fc;box-shadow:inset 3px 0 0 var(--purple)}
.acc-av{width:26px;height:26px;background:rgba(255,255,255,.06);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txt-dim);font-family:'DM Mono',monospace;flex-shrink:0}
.acc-item.active .acc-av{background:rgba(99,102,241,.2);color:#a5b4fc}
.acc-info{min-width:0}
.acc-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:11.5px}
.sb-foot{padding:11px 18px;border-top:1px solid var(--border2)}
.lat-row{display:flex;align-items:center;gap:5px;font-size:10px;font-family:'DM Mono',monospace;color:var(--txt-dim)}
.lat-v{color:var(--blue);font-weight:500}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;z-index:5}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid var(--border2);background:rgba(6,6,8,.95);backdrop-filter:blur(20px);flex-shrink:0;position:relative;z-index:10}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple-g),transparent)}
.page-title{font-size:17px;font-weight:600;color:#fff;letter-spacing:-.3px}
.page-sub{font-size:9.5px;color:var(--txt-dim);margin-top:1px;font-family:'DM Mono',monospace}
.topbar-r{display:flex;align-items:center;gap:6px}
.chip,.clock{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:5px 12px;font-size:10.5px;font-family:'DM Mono',monospace;color:var(--txt-mid);border-radius:5px;cursor:pointer;transition:all .15s;text-decoration:none}
.chip:hover{background:rgba(255,255,255,.09);color:var(--txt)}
.logout-chip{background:rgba(244,63,94,.08)!important;border:1px solid rgba(244,63,94,.2)!important;color:var(--red)!important}
.admin-chip{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.06))!important;border:1px solid rgba(245,158,11,.35)!important;color:var(--amber)!important;font-weight:600;animation:aGlow 2s ease-in-out infinite alternate;text-decoration:none}
@keyframes aGlow{0%{box-shadow:0 0 8px rgba(245,158,11,.15)}100%{box-shadow:0 0 20px rgba(245,158,11,.3)}}
.content{flex:1;overflow-y:auto;padding:18px 24px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2);border-radius:3px}
/* STATEMENT CARDS */
.stmt-hero{background:linear-gradient(135deg,rgba(255,255,255,.03),rgba(255,255,255,.015));border:1px solid rgba(255,255,255,.07);padding:22px 26px;border-radius:12px;margin-bottom:14px;position:relative;overflow:hidden}
.stmt-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),rgba(139,92,246,.4),transparent)}
.stmt-hero-row{display:flex;align-items:flex-start;gap:20px;flex-wrap:wrap}
.stmt-key{font-size:28px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.stmt-sub{font-size:10px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:4px}
.stmt-fee-block{margin-left:auto;text-align:right}
.stmt-fee-lbl{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-bottom:4px}
.stmt-fee-amt{font-size:26px;font-weight:700;font-family:'DM Mono',monospace}
.stmt-fee-thb{font-size:13px;font-family:'DM Mono',monospace;color:var(--txt-dim);margin-top:2px}
/* STAT ROW */
.stmt-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.ss{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);padding:13px 15px;border-radius:var(--radius);position:relative;overflow:hidden;transition:border-color .2s,transform .18s}
.ss:hover{transform:translateY(-1px);border-color:rgba(255,255,255,.1)}
.ss::before{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.ss.g::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.ss.r::before{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.ss.p::before{background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.ss.a::before{background:linear-gradient(90deg,transparent,var(--amber),transparent)}
.ss-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-bottom:5px}
.ss-val{font-size:20px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:-.5px}
.ss.g .ss-val{color:var(--green)}.ss.r .ss-val{color:var(--red)}.ss.p .ss-val{color:#a5b4fc}.ss.a .ss-val{color:var(--amber)}
.ss-sub{font-size:9.5px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:3px}
/* RECORDS TABLE */
.rec-panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.rec-hd{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border2);flex-wrap:wrap;gap:8px}
.rec-title{font-size:11px;font-weight:600;letter-spacing:.5px;color:var(--txt);text-transform:uppercase;font-family:'DM Mono',monospace}
table{width:100%;border-collapse:collapse}
thead th{padding:8px 13px;text-align:left;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-weight:500;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border2);font-family:'DM Mono',monospace;white-space:nowrap}
tbody td{padding:9px 13px;font-size:11.5px;font-family:'DM Mono',monospace;border-bottom:1px solid rgba(255,255,255,.04);color:var(--txt-mid);white-space:nowrap}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:rgba(255,255,255,.03)}
tbody tr:hover td{color:var(--txt)}
tbody tr:nth-child(even){background:rgba(255,255,255,.008)}
/* BADGES */
.badge-paid{display:inline-flex;align-items:center;padding:2px 10px;font-size:9.5px;border-radius:20px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.2);color:var(--green);font-family:'DM Mono',monospace}
.badge-pending{display:inline-flex;align-items:center;padding:2px 10px;font-size:9.5px;border-radius:20px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--amber);font-family:'DM Mono',monospace}
/* EMPTY */
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:500;color:var(--txt-mid);margin-bottom:6px}
.empty-sub{font-size:11px;color:var(--txt-dim);font-family:'DM Mono',monospace;line-height:1.6}
/* MOBILE */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(12,14,20,.97);border-top:1px solid var(--border2);z-index:100;padding:8px 0 calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(20px)}
.mob-nav-inner{display:flex;justify-content:space-around}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 12px;cursor:pointer;color:var(--txt-dim);font-size:9.5px;text-decoration:none;font-family:'DM Mono',monospace;transition:color .15s}
.mob-btn.active{color:#a5b4fc}
.mob-icon{font-size:17px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:19;backdrop-filter:blur(6px)}
.sb-overlay.show{display:block}
@media(max-width:768px){
  .sidebar{position:fixed;left:-256px;top:0;bottom:0;transition:left .28s;z-index:20}
  .sidebar.open{left:0}
  .main{padding-bottom:64px}
  .mob-nav{display:block}
  .topbar{padding:11px 14px}
  .content{padding:10px}
  .stmt-stats{grid-template-columns:1fr 1fr;gap:6px}
  .clock{display:none}
}
</style>
</head>

    <a class="mob-btn active" href="statement.html"><div class="mob-icon">💰</div>Statement</a>

<script>
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
let myKey='',myName='',myEmail='';

(async()=>{
  const{data:{session}}=await sbc.auth.getSession();
  if(!session){window.location.replace('login.html');return;}
  myEmail=session.user.email;
  /* get license key */
  const{data:lk}=await sbc.from('license_keys').select('*').eq('user_id',session.user.id).single();
  if(!lk){window.location.replace('index.html');return;}
  myKey=lk.license_key;myName=lk.display_name||myKey;
  document.getElementById('userKey').textContent=myKey;
  document.getElementById('pageSub').textContent=myKey+' · REVENUE SHARE';
  if(lk.is_admin){['adminNav','adminTopBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex'});}
  document.body.style.visibility='visible';document.body.style.opacity='1';
  loadStatement();
})();

/* ══ AUTH GUARD ══ */
(async()=>{
  try{
    const _sb=supabase.createClient("https://tfnikhovkbbrhvrkobpu.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo");
    const{data:{session}}=await _sb.auth.getSession();
    if(!session){window.location.replace('login.html');return;}
    const{data:lk}=await _sb.from('license_keys').select('license_key,is_admin,display_name').eq('user_id',session.user.id).single();
    if(!lk){window.location.replace('login.html');return;}
    window._isAdmin=lk.is_admin||false;
    window._myLicenseKey=lk.license_key||'';
    window._displayName=lk.display_name||lk.license_key||'';
    window._userId=session.user.id;
    window._userEmail=session.user.email;
    try{
      const{data:md}=await _sb.from('menu_settings').select('page_key,is_visible');
      window._menuVis={};
      if(md)md.forEach(m=>window._menuVis[m.page_key]=m.is_visible);
      if(!lk.is_admin&&window._menuVis['statement']===false){window.location.replace('index.html');return;}
    }catch(e){}
    if(lk.is_admin)document.querySelectorAll('#adminNav,#adminTopBtn').forEach(el=>{if(el)el.style.display='flex';});
    const ea=document.getElementById('nav-ea-settings');if(ea)ea.style.display=lk.is_admin?'flex':'none';
    document.body.style.visibility='visible';document.body.style.opacity='1';
    const uc=document.getElementById('userChip');if(uc)uc.textContent=window._displayName||'';
    loadStatement();
  }catch(err){console.error('Auth:',err);window.location.replace('login.html');}
})();

setInterval(()=>{document.getElementById('clockEl').textContent=new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbO').classList.toggle('show')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbO').classList.remove('show')}
async function doLogout(){await sbc.auth.signOut();window.location.replace('login.html')}

async function loadStatement(){
  /* get revenue_share records */
  const{data:rs}=await sbc.from('revenue_share').select('*').eq('license_key',myKey).order('created_at',{ascending:false});
  /* get trade stats */
  const{data:trades}=await sbc.from('trade_history').select('profit,account_balance').eq('license_key',myKey).eq('trade_action','CLOSE');

  /* compute totals */
  const allPNL=trades?trades.reduce((a,r)=>a+(+r.profit||0),0):0;
  const allWins=trades?trades.filter(r=>(+r.profit||0)>0).length:0;
  const allWR=trades?.length?Math.round(allWins/trades.length*100):0;
  const latBal=trades?.length?(+trades[trades.length-1].account_balance||0):0;
  const pendingFee=rs?rs.filter(r=>r.status==='pending').reduce((a,r)=>a+(+r.fee_thb||0),0):0;

  /* build user card */
  const initials=myName.substring(0,2).toUpperCase();
  let html=`
  <div class="user-card">
    <div class="user-corner"></div>
    <div class="user-av">${initials}</div>
    <div>
      <div class="user-info-name">${myName}</div>
      <div class="user-info-key">◈ ${myKey}</div>
      <div class="user-info-email">${myEmail}</div>
    </div>
    <div class="user-stats">
      <div class="us-item"><div class="us-lbl">Net P/L</div><div class="us-val" style="color:${allPNL>=0?'var(--green)':'var(--red)'}">${allPNL>=0?'+$':'-$'}${Math.abs(allPNL).toFixed(2)}</div></div>
      <div class="us-item"><div class="us-lbl">Win Rate</div><div class="us-val" style="color:${allWR>=60?'var(--green)':allWR>=40?'var(--amber)':'var(--red)'}">${trades?.length?allWR+'%':'—'}</div></div>
      <div class="us-item"><div class="us-lbl">Balance</div><div class="us-val" style="color:#a5b4fc">$${latBal.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
    </div>
  </div>`;

  /* pending banner */
  if(pendingFee>0){
    html+=`<div class="pending-banner">
      <div class="pb-left"><div class="pb-icon">⚠</div><div><div class="pb-title">มียอดค้างชำระ</div><div class="pb-sub">กรุณาติดต่อผู้ดูแลเพื่อชำระค่าบริการ</div></div></div>
      <div class="pb-amount">฿${pendingFee.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
    </div>`;
  }

  /* statement list */
  if(!rs||!rs.length){
    html+=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">ยังไม่มี Statement</div><div class="empty-sub">ยอดจะแสดงเมื่อ Admin คำนวณ Revenue Share</div></div>`;
  } else {
    html+='<div class="stmt-list">';
    rs.forEach(r=>{
      const isPending=r.status==='pending';
      const ps=new Date(r.period_start),pe=new Date(r.period_end);
      const periodStr=ps.getDate()+' '+MONTHS[ps.getMonth()]+' – '+pe.getDate()+' '+MONTHS[pe.getMonth()]+' '+(pe.getFullYear()+543);
      const gp=+r.gross_profit||0,fee=+r.fee_usd||0,thb=+r.fee_thb||0,rate=+r.usd_thb_rate||36,pct=+r.percent||0;
      html+=`<div class="stmt-card ${isPending?'pending-card':'paid-card'}">
        <div class="stmt-stripe"></div>
        <div class="sc-corner2"></div>
        <div class="stmt-inner">
          <div class="stmt-hd">
            <div>
              <div class="stmt-period">${periodStr}</div>
              <div class="stmt-range" style="margin-top:6px"><span class="${isPending?'badge-pending':'badge-paid'} stmt-status">${isPending?'รอชำระ':'ชำระแล้ว'}</span></div>
            </div>
            <div class="stmt-fee">
              <div class="stmt-fee-usd">$${fee.toFixed(2)}</div>
              <div class="stmt-fee-thb">≈ ฿${thb.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
            </div>
          </div>
          <div class="stmt-grid">
            <div class="sg-item"><div class="sg-lbl">Gross Profit</div><div class="sg-val" style="color:var(--green)">+$${gp.toFixed(2)}</div></div>
            <div class="sg-item"><div class="sg-lbl">Fee Rate</div><div class="sg-val" style="color:var(--amber)">${pct}%</div></div>
            <div class="sg-item"><div class="sg-lbl">USD Rate</div><div class="sg-val" style="color:var(--blue)">฿${rate}</div></div>
            <div class="sg-item"><div class="sg-lbl">Created</div><div class="sg-val" style="font-size:11px;color:var(--txt-dim)">${new Date(r.created_at).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'})}</div></div>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  }

  document.getElementById('mainContent').innerHTML=html;
}
</script>
</body>
</html>
