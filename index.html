<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISx | Quantitative Trading</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; margin: 0; padding: 40px 20px; }
        .container { max-width: 1100px; margin: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #1e293b; padding-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 700; color: #38bdf8; letter-spacing: -1px; }
        .status-badge { background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 6px 16px; border-radius: 100px; font-size: 12px; font-weight: 600; border: 1px solid rgba(16, 185, 129, 0.2); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: #111827; border: 1px solid #1e293b; padding: 24px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card-label { color: #94a3b8; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: 700; color: #f8fafc; }
        
        .chart-container { background: #111827; border: 1px solid #1e293b; padding: 24px; border-radius: 16px; margin-bottom: 30px; height: 400px; }
        
        table { width: 100%; border-collapse: collapse; background: #111827; border-radius: 16px; overflow: hidden; border: 1px solid #1e293b; }
        th { background: #1f2937; padding: 16px; text-align: left; font-size: 13px; color: #94a3b8; }
        td { padding: 16px; border-top: 1px solid #1e293b; font-size: 14px; }
        .profit { color: #10b981; font-weight: 600; }
        .loss { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">ARIS<span style="color:#fff">x</span> MONITORING</div>
            <div class="status-badge">LIVE ENGINE ACTIVE</div>
        </div>

        <div class="grid">
            <div class="card">
                <div class="card-label">Equity Balance</div>
                <div id="balance" class="card-value">$0.00</div>
            </div>
            <div class="card">
                <div class="card-label">Total Trades</div>
                <div id="totalTrades" class="card-value">0</div>
            </div>
            <div class="card">
                <div class="card-label">Last Update</div>
                <div id="lastUpdate" class="card-value" style="font-size: 18px;">Waiting for data...</div>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="equityChart"></canvas>
        </div>

        <div class="card" style="padding:0">
            <table id="historyTable">
                <thead>
                    <tr>
                        <th>TIME (UTC)</th>
                        <th>ORDER TYPE</th>
                        <th>SYMBOL</th>
                        <th>PROFIT ($)</th>
                        <th>BALANCE</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const SUB_URL = "https://tfnikhovkbbrhvrkobpu.supabase.co";
        const SUB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo";
        const supabaseClient = supabase.createClient(SUB_URL, SUB_KEY);

        async function loadData() {
            const { data, error } = await supabaseClient
                .from('trade_history')
                .select('*')
                .order('created_at', { ascending: true });

            if (error || !data || data.length === 0) return;

            const lastData = data[data.length - 1];
            document.getElementById('balance').innerText = "$" + lastData.account_balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('totalTrades').innerText = data.length;
            document.getElementById('lastUpdate').innerText = new Date(lastData.created_at).toLocaleTimeString();

            // กราฟ
            const ctx = document.getElementById('equityChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i + 1),
                    datasets: [{
                        label: 'Equity Curve',
                        data: data.map(d => d.account_balance),
                        borderColor: '#38bdf8',
                        backgroundColor: 'rgba(56, 189, 248, 0.05)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 3,
                        pointRadius: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#64748b' } },
                        y: { grid: { color: '#1e293b' }, ticks: { color: '#64748b' } }
                    }
                }
            });

            // ตาราง
            const tableBody = document.querySelector('#historyTable tbody');
            tableBody.innerHTML = data.reverse().map(row => `
                <tr>
                    <td>${new Date(row.created_at).toLocaleString()}</td>
                    <td>${row.order_type || 'TRADE'}</td>
                    <td>${row.symbol || 'XAUUSD'}</td>
                    <td class="${row.profit >= 0 ? 'profit' : 'loss'}">${row.profit >= 0 ? '+' : ''}${row.profit || 0}</td>
                    <td>$${row.account_balance.toLocaleString()}</td>
                </tr>
            `).join('');
        }
        loadData();
        setInterval(loadData, 30000); // อัปเดตทุก 30 วินาที
    </script>
</body>
</html>
