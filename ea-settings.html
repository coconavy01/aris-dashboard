<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ARISx QUANT — EA Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>body{visibility:hidden;opacity:0}</style>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100vw}
body{visibility:hidden;opacity:0}
:root{
  --bg:#060608;--s1:#0c0e14;--s2:#111420;--s3:#161926;
  --purple:#6366f1;--purple-d:rgba(99,102,241,.12);--purple-g:rgba(99,102,241,.28);
  --green:#10b981;--green-d:rgba(16,185,129,.1);
  --red:#f43f5e;--red-d:rgba(244,63,94,.1);
  --amber:#f59e0b;--amber-d:rgba(245,158,11,.1);
  --blue:#38bdf8;--blue-d:rgba(56,189,248,.1);
  --teal:#06b6d4;--teal-d:rgba(6,182,212,.1);
  --border2:rgba(255,255,255,.04);
  --txt:#f1f5f9;--txt-mid:#94a3b8;--txt-dim:#475569;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.009) 2px,rgba(255,255,255,.009) 4px);pointer-events:none;z-index:0}

/* glow */
.glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.05) 0%,transparent 70%);top:-150px;right:50px;pointer-events:none;z-index:0;animation:drift 10s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--s1);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:relative;z-index:20;overflow:hidden}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--purple-g),transparent)}
.sb-top{padding:28px 22px 20px;border-bottom:1px solid var(--border2)}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--purple),#8b5cf6);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0}
.logo-name{font-size:19px;font-weight:600;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:9.5px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:1px}
.live-pill{display:flex;align-items:center;gap:6px;margin-top:14px;padding:6px 12px;background:var(--green-d);border:1px solid rgba(16,185,129,.18);font-size:10px;font-family:'DM Mono',monospace;color:var(--green);letter-spacing:.5px;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:ping 1.5s ease infinite}
@keyframes ping{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.sb-nav{padding:18px 14px 8px}
.nav-sect{font-size:9px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;padding:0 8px;margin-bottom:8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;transition:all .15s;color:var(--txt-dim);font-size:13px;font-weight:500;text-decoration:none;border:1px solid transparent;margin-bottom:2px;position:relative;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.nav-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--purple);transform:scaleY(0);transition:transform .15s}
.nav-btn:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.nav-btn.active{background:var(--purple-d);color:#a5b4fc;border-color:rgba(99,102,241,.18)}
.nav-btn.active::before{transform:scaleY(1)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-accs{flex:1;overflow-y:auto;padding:4px 14px 14px}
.sb-accs::-webkit-scrollbar{width:2px}
.acc-item{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;transition:all .15s;margin-bottom:2px;color:var(--txt-dim);font-size:12px;font-weight:500;border:1px solid transparent;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,0 100%)}
.acc-item:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.acc-item.active{background:var(--purple-d);color:#a5b4fc;border-color:rgba(99,102,241,.18)}
.acc-av{width:26px;height:26px;background:var(--s3);clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--txt-dim);font-family:'DM Mono',monospace;flex-shrink:0}
.acc-item.active .acc-av{background:var(--purple-d);color:#a5b4fc}
.sb-foot{padding:14px 22px;border-top:1px solid var(--border2)}
.lat-row{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--txt-dim)}
.lat-v{color:var(--blue);font-weight:500}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;z-index:5}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:1px solid var(--border2);background:rgba(6,6,8,.92);backdrop-filter:blur(16px);flex-shrink:0;position:relative;z-index:10}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple-g),transparent)}
.page-title{font-size:20px;font-weight:600;color:#fff;letter-spacing:-.3px}
.page-sub{font-size:10px;color:var(--txt-dim);margin-top:2px;font-family:'DM Mono',monospace}
.topbar-r{display:flex;align-items:center;gap:8px}
.chip{background:var(--s2);border:1px solid var(--border2);padding:6px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--txt-mid);clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);text-decoration:none;transition:all .15s;cursor:pointer}
.chip:hover{border-color:rgba(255,255,255,.1);color:var(--txt)}
.logout-chip{background:var(--red-d);border-color:rgba(244,63,94,.2);color:var(--red)}
.admin-chip{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.06));border-color:rgba(245,158,11,.4);color:var(--amber);font-weight:600;animation:ag 2s ease-in-out infinite alternate;text-decoration:none}
@keyframes ag{0%{box-shadow:0 0 6px rgba(245,158,11,.1)}100%{box-shadow:0 0 18px rgba(245,158,11,.25)}}
.content{flex:1;overflow-y:auto;padding:24px 36px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2)}

/* KEY SELECTOR */
.key-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.key-lbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace}
.key-btns{display:flex;gap:4px;flex-wrap:wrap}
.kb{padding:6px 14px;font-size:11px;cursor:pointer;color:var(--txt-dim);background:var(--s2);border:1px solid var(--border2);font-family:'DM Mono',monospace;transition:all .15s;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.kb.active{background:var(--purple-d);color:#a5b4fc;border-color:rgba(99,102,241,.22)}
.kb:hover{border-color:rgba(255,255,255,.1);color:var(--txt)}
.snap-time{margin-left:auto;font-size:10px;color:var(--txt-dim);font-family:'DM Mono',monospace;padding:6px 12px;background:var(--s2);border:1px solid var(--border2);clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}

/* SETTINGS HEADER */
.settings-hero{background:rgba(255,255,255,.022);border:1px solid var(--border2);padding:22px 28px;margin-bottom:16px;position:relative;clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,0 100%);overflow:hidden}
.sh-corner{position:absolute;top:0;right:0;width:20px;height:20px;background:var(--purple-d);clip-path:polygon(0 0,100% 100%,100% 0)}
.sh-glow{position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:radial-gradient(circle,rgba(99,102,241,.07) 0%,transparent 70%);pointer-events:none}
.sh-row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;position:relative;z-index:1}
.sh-key{font-size:28px;font-weight:600;color:var(--amber);font-family:'DM Mono',monospace;letter-spacing:-.5px}
.sh-sym{font-size:14px;color:var(--txt-mid);font-family:'DM Mono',monospace;margin-top:2px}
.sh-meta{margin-left:auto;text-align:right}
.sh-broker{font-size:12px;color:#a5b4fc;font-family:'DM Mono',monospace}
.sh-balance{font-size:20px;font-weight:500;font-family:'DM Mono',monospace;color:var(--green)}
.sh-lever{font-size:10px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:2px}
.sh-tags{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;position:relative;z-index:1}
.tag{padding:4px 12px;font-size:9.5px;font-weight:500;font-family:'DM Mono',monospace;clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);border:1px solid transparent}
.tag-on{background:var(--green-d);border-color:rgba(16,185,129,.2);color:var(--green)}
.tag-off{background:rgba(255,255,255,.04);border-color:var(--border2);color:var(--txt-dim)}
.tag-info{background:var(--purple-d);border-color:rgba(99,102,241,.2);color:#a5b4fc}
.tag-warn{background:var(--amber-d);border-color:rgba(245,158,11,.2);color:var(--amber)}

/* SECTION LAYOUT */
.sections{display:flex;flex-direction:column;gap:14px}
.section{background:rgba(255,255,255,.02);border:1px solid var(--border2);overflow:hidden;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);transition:border-color .2s}
.section:hover{border-color:rgba(255,255,255,.07)}
.sec-hd{display:flex;align-items:center;gap:10px;padding:13px 20px;border-bottom:1px solid var(--border2);background:rgba(255,255,255,.015);cursor:pointer;user-select:none}
.sec-icon{font-size:14px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--txt-mid)}
.sec-count{margin-left:auto;font-size:9.5px;font-family:'DM Mono',monospace;color:var(--txt-dim);padding:3px 10px;background:rgba(255,255,255,.04);clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.sec-toggle{font-size:11px;color:var(--txt-dim);transition:transform .2s;margin-left:4px}
.sec-toggle.open{transform:rotate(180deg)}
.sec-body{display:grid;grid-template-columns:repeat(4,1fr);gap:0;overflow:hidden;max-height:0;transition:max-height .3s ease}
.sec-body.open{max-height:600px}

/* PARAM ROW */
.param{padding:12px 20px;border-bottom:1px solid var(--border2);border-right:1px solid var(--border2);display:flex;flex-direction:column;gap:4px;transition:background .15s}
.param:hover{background:rgba(255,255,255,.025)}
.param:nth-child(4n){border-right:none}
.param:last-child{border-bottom:none}
.param-lbl{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace}
.param-val{font-size:14px;font-weight:500;font-family:'DM Mono',monospace;color:var(--txt)}
.param-val.val-on{color:var(--green)}.param-val.val-off{color:var(--txt-dim)}.param-val.val-amber{color:var(--amber)}.param-val.val-blue{color:var(--blue)}.param-val.val-purple{color:#a5b4fc}.param-val.val-red{color:var(--red)}

/* TIMELINE */
.timeline{margin-top:16px;margin-bottom:16px}
.tl-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-bottom:12px}
.tl-list{display:flex;flex-direction:column;gap:0}
.tl-item{display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid var(--border2);cursor:pointer;transition:all .15s}
.tl-item:last-child{border-bottom:none}
.tl-item:hover{background:rgba(255,255,255,.02);padding-left:6px;padding-right:6px}
.tl-item.selected{background:rgba(99,102,241,.06);padding-left:6px;padding-right:6px;border-left:2px solid var(--purple)}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-dot.latest{background:var(--green);box-shadow:0 0 8px rgba(16,185,129,.5)}
.tl-dot.old{background:rgba(255,255,255,.15)}
.tl-info{flex:1}
.tl-time{font-size:11px;font-weight:500;font-family:'DM Mono',monospace;color:var(--txt)}
.tl-sym{font-size:10px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:1px}
.tl-badge{margin-left:auto;font-size:9px;font-family:'DM Mono',monospace;padding:3px 10px;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.tl-badge.latest{background:var(--green-d);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.tl-badge.old{background:var(--s2);border:1px solid var(--border2);color:var(--txt-dim)}

/* NO DATA */
.no-data{text-align:center;padding:60px 20px;color:var(--txt-dim)}
.no-data-icon{font-size:40px;margin-bottom:12px}
.no-data-title{font-size:14px;font-weight:500;color:var(--txt-mid);margin-bottom:6px}
.no-data-sub{font-size:12px;font-family:'DM Mono',monospace}

/* mobile */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border2);z-index:100;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.mob-nav-inner{display:flex;justify-content:space-around}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;cursor:pointer;color:var(--txt-dim);font-size:10px;text-decoration:none;font-family:'DM Mono',monospace;transition:color .15s}
.mob-btn.active{color:#a5b4fc}
.mob-icon{font-size:18px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:19;backdrop-filter:blur(4px)}
.sb-overlay.show{display:block}

@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;transition:left .3s;z-index:20}
  .sidebar.open{left:0}
  .main{padding-bottom:68px}
  .mob-nav{display:block}
  .topbar{padding:14px 16px}
  .content{padding:14px}
  .sec-body{grid-template-columns:1fr 1fr}
  .param:nth-child(2n){border-right:none}
  .chip.clock{display:none}
}
</style>
</head>
<body>
<div class="glow"></div>

<aside class="sidebar" id="sidebar">
  <div class="sb-top">

<div class="main">

</div>

<script>
let isAdm=false,myKey='',allSnaps=[],curKey='',selSnap=null;

/* AUTH GUARD */



/* ══ SHARED AUTH + MENU GUARD ══ */
async function initApp(pageKey,onReady){
  const _sb=supabase.createClient("https://tfnikhovkbbrhvrkobpu.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo");
  const{data:{session}}=await _sb.auth.getSession();
  if(!session){window.location.replace('login.html');return;}
  const{data:lk}=await _sb.from('license_keys').select('license_key,is_admin,display_name').eq('user_id',session.user.id).single();
  if(!lk){window.location.replace('login.html');return;}
  window._isAdmin=lk.is_admin||false;
  window._myLicenseKey=lk.license_key||'';
  window._displayName=lk.display_name||lk.license_key||'';
  window._userId=session.user.id;
  window._userEmail=session.user.email;
  const{data:md}=await _sb.from('menu_settings').select('page_key,is_visible');
  window._menuVis={};
  if(md)md.forEach(m=>window._menuVis[m.page_key]=m.is_visible);
  if(pageKey&&!lk.is_admin&&window._menuVis[pageKey]===false){window.location.replace('index.html');return;}
  _applyNav(lk.is_admin);
  document.body.style.visibility='visible';document.body.style.opacity='1';
  if(onReady)onReady();
}
function _applyNav(isAdmin){
  if(isAdmin){document.querySelectorAll('#adminNav,#adminTopBtn').forEach(el=>{if(el)el.style.display='flex';});}
  const ea=document.getElementById('nav-ea-settings');if(ea)ea.style.display=isAdmin?'flex':'none';
  if(!isAdmin){
    const map={time_analysis:'nav-time-analysis',calendar:'nav-calendar',statement:'nav-statement'};
    Object.entries(map).forEach(([k,id])=>{const el=document.getElementById(id);if(el&&window._menuVis[k]===false)el.style.display='none';});
  }
  const uc=document.getElementById('userChip');if(uc)uc.textContent=window._displayName||'';
}

initApp(null, ()=>{
  sbc=supabase.createClient("https://tfnikhovkbbrhvrkobpu.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo");
  if(!window._isAdmin){window.location.replace("index.html");return;}
  loadAll();
});
setInterval(()=>{document.getElementById('clockEl').textContent=new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbO').classList.toggle('show')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbO').classList.remove('show')}
async function doLogout(){await sbc.auth.signOut();window.location.replace('login.html')}

async function loadAll(){
  const t0=performance.now();
  let q=sbc.from('ea_settings').select('*').order('created_at',{ascending:false});
  if(!isAdm&&myKey) q=q.eq('license_key',myKey);
  const{data}=await q;
  document.getElementById('latVal').textContent=Math.round(performance.now()-t0);
  document.getElementById('syncLbl').textContent=new Date().toLocaleTimeString('th-TH');
  allSnaps=data||[];
  if(!allSnaps.length){renderEmpty();return;}
  buildSidebar();
  /* auto-select first key */
  const keys=[...new Set(allSnaps.map(r=>r.license_key))];
  curKey=isAdm?keys[0]:myKey;
  selSnap=allSnaps.find(r=>r.license_key===curKey);
  renderAll();
}

function buildSidebar(){
  const keys=isAdm?[...new Set(allSnaps.map(r=>r.license_key))].sort():[myKey];
  let h='';
  keys.forEach(k=>{
    const snaps=allSnaps.filter(r=>r.license_key===k);
    const latest=snaps[0];
    h+=`<div class="acc-item${curKey===k?' active':''}" onclick="selectKey('${k}')">
      <div class="acc-av">${k[0]?.toUpperCase()||'?'}</div>
      <div>
        <div style="font-size:12px">${k}</div>
        <div style="font-size:9.5px;font-family:'DM Mono',monospace;color:var(--txt-dim);margin-top:1px">${snaps.length} snapshot${snaps.length!==1?'s':''}</div>
      </div>
    </div>`;
  });
  document.getElementById('accList').innerHTML=h;
}

function selectKey(k){
  curKey=k;
  const snaps=allSnaps.filter(r=>r.license_key===k);
  selSnap=snaps[0];
  buildSidebar();renderAll();
}

function selectSnap(id){
  selSnap=allSnaps.find(r=>r.id===id);
  if(!selSnap)return;
  /* update timeline selection visually without full re-render */
  document.querySelectorAll('.tl-item').forEach(el=>{
    const elId=el.getAttribute('data-snap-id');
    el.classList.toggle('selected', elId===id);
  });
  renderMain();
}

function renderAll(){
  document.getElementById('pageSub').textContent=curKey+' · INPUT PARAMETERS';
  const snaps=allSnaps.filter(r=>r.license_key===curKey);
  let html='';

  /* Timeline */
  html+=`<div class="timeline">
    <div class="tl-title">◈ Snapshot History — ${snaps.length} บันทึก</div>
    <div class="tl-list">`;
  snaps.forEach((s,i)=>{
    const dt=new Date(s.created_at);
    const isLatest=i===0,isSel=selSnap?.id===s.id;
    html+=`<div class="tl-item${isSel?' selected':''}" data-snap-id="${s.id}" onclick="selectSnap(this.dataset.snapId)">
      <div class="tl-dot ${isLatest?'latest':'old'}"></div>
      <div class="tl-info">
        <div class="tl-time">${dt.toLocaleString('th-TH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'})}</div>
        <div class="tl-sym">${s.symbol||'—'} · ${s.timeframe||'—'}</div>
      </div>
      <div class="tl-badge ${isLatest?'latest':'old'}">${isLatest?'LATEST':'SNAPSHOT'}</div>
    </div>`;
  });
  html+='</div></div>';
  html+='<div id="snapDetail"></div>';
  document.getElementById('mainContent').innerHTML=html;
  renderMain();
}

function renderMain(){
  if(!selSnap){return;}
  const s=selSnap;
  const dt=new Date(s.created_at).toLocaleString('th-TH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

  /* Hero */
  let heroTags='';
  heroTags+=tag(s.use_time_filter,'TIME FILTER');
  heroTags+=tag(s.use_adx_filter,'ADX');
  heroTags+=tag(s.use_rsi_filter,'RSI');
  heroTags+=tag(s.use_trailing,'TRAILING STOP');
  heroTags+=tag(s.use_breakeven,'BREAKEVEN');
  heroTags+=tag(s.use_lot_boost,'LOT BOOST');
  heroTags+=tag(s.use_reverse,'REVERSE MODE');
  heroTags+=tag(s.use_compounding,'COMPOUNDING');
  if(s.delay_mode)heroTags+=`<span class="tag tag-info">${s.delay_mode.replace('DELAY_','')}</span>`;

  let html=`<div class="settings-hero">
    <div class="sh-corner"></div><div class="sh-glow"></div>
    <div class="sh-row">
      <div>
        <div class="sh-key">${s.license_key}</div>
        <div class="sh-sym">${s.symbol||'—'} · ${s.timeframe||'—'} · Magic: ${s.magic_number||'—'}</div>
      </div>
      <div class="sh-meta">
        <div class="sh-broker">${s.broker||'—'}</div>
        <div class="sh-balance">$${(+s.balance||0).toLocaleString(undefined,{minimumFractionDigits:2})}</div>
        <div class="sh-lever">1:${s.leverage||'—'} leverage · ${dt}</div>
      </div>
    </div>
    <div class="sh-tags">${heroTags}</div>
  </div>`;

  /* Sections */
  html+='<div class="sections">';
  html+=section('📊','Indicator & Signal',[
    param('MA Period',s.trend_ma_period,'val-blue'),
    param('MACD Fast',s.macd_fast,'val-blue'),
    param('MACD Slow',s.macd_slow,'val-blue'),
    param('MACD Signal',s.macd_signal,'val-blue'),
    param('ADX Period',s.adx_period,'val-blue'),
    param('ADX Threshold',s.adx_threshold,'val-amber'),
    param('RSI Period',s.rsi_period,'val-blue'),
    param('RSI Overbought',s.rsi_overbought,'val-red'),
    param('RSI Oversold',s.rsi_oversold,'val-green'),
  ],'sec-indicator',true);

  html+=section('⏱️','Signal Delay',[
    param('Delay Mode',s.delay_mode?.replace('DELAY_',''),'val-amber'),
    param('Delay Seconds',s.delay_seconds?s.delay_seconds+'s':'—','val-amber'),
  ],'sec-delay',true);

  html+=section('💰','Money Management',[
    param('Fixed Lot',s.fixed_lot,'val-amber'),
    param('Compounding',boolVal(s.use_compounding)),
    param('Risk %',s.risk_percent?s.risk_percent+'%':'—','val-purple'),
    param('Lot Boost',boolVal(s.use_lot_boost)),
    param('Boost Lot',s.boost_lot,'val-amber'),
    param('Boost Streak',s.boost_streak,'val-blue'),
    param('Boost Max Trades',s.boost_max_trades,'val-blue'),
  ],'sec-mm',true);

  html+=section('🎯','Trade Settings',[
    param('Take Profit',s.takeprofit?s.takeprofit+' pts':'—','val-green'),
    param('Stop Loss',s.stoploss?s.stoploss+' pts':'—','val-red'),
    param('Trailing Stop',boolVal(s.use_trailing)),
    param('Trailing Start',s.trailing_start?s.trailing_start+' pts':'—','val-amber'),
    param('Trailing Step',s.trailing_step?s.trailing_step+' pts':'—','val-amber'),
    param('Breakeven',boolVal(s.use_breakeven)),
    param('BE Start',s.breakeven_start?s.breakeven_start+' pts':'—','val-amber'),
    param('BE Offset',s.breakeven_offset?s.breakeven_offset+' pts':'—','val-amber'),
  ],'sec-trade',true);

  html+=section('🛡️','Risk Controls',[
    param('Max Spread',s.max_spread?s.max_spread+' pts':'—','val-red'),
    param('Daily Profit Target','$'+(s.daily_profit_target||0),'val-green'),
    param('Daily Loss Limit','$'+(s.daily_loss_limit||0),'val-red'),
    param('Cooldown Mode',s.cooldown_mode?.replace('COOLDOWN_',''),'val-amber'),
    param('Cooldown Minutes',s.cooldown_minutes?s.cooldown_minutes+'m':'—','val-amber'),
    param('Reverse Mode',boolVal(s.use_reverse)),
    param('Close On Opposite',boolVal(s.close_on_opposite)),
  ],'sec-risk',true);

  /* Time slots */
  const slots=[s.slot_1,s.slot_2,s.slot_3,s.slot_4,s.slot_5].filter(Boolean);
  if(s.use_time_filter&&slots.length){
    const slotParams=slots.map((sl,i)=>param('Slot '+(i+1),sl,'val-blue'));
    slotParams.unshift(param('Time Filter',boolVal(s.use_time_filter)));
    html+=section('🕐','Time Filter',slotParams,'sec-time',true);
  }

  html+='</div>';
  document.getElementById('snapDetail').innerHTML=html;

  /* Open all sections */
  document.querySelectorAll('.sec-body').forEach(el=>{el.classList.add('open');});
  document.querySelectorAll('.sec-toggle').forEach(el=>{el.classList.add('open');});
}

function section(icon,title,params,id,open){
  return`<div class="section" id="${id}">
    <div class="sec-hd" onclick="toggleSec('${id}')">
      <span class="sec-icon">${icon}</span>
      <span class="sec-title">${title}</span>
      <span class="sec-count">${params.length} params</span>
      <span class="sec-toggle${open?' open':''}" id="tog-${id}">▾</span>
    </div>
    <div class="sec-body${open?' open':''}">${params.join('')}</div>
  </div>`;
}

function param(lbl,val,cls=''){
  const display=val===null||val===undefined||val===''?'—':val;
  return`<div class="param"><div class="param-lbl">${lbl}</div><div class="param-val ${cls}">${display}</div></div>`;
}

function boolVal(v){
  if(v===null||v===undefined)return'—';
  return v?'<span class="val-on">ON ✓</span>':'<span class="val-off">OFF —</span>';
}

function tag(val,label){
  if(val===null||val===undefined)return'';
  return`<span class="tag ${val?'tag-on':'tag-off'}">${label}</span>`;
}

function toggleSec(id){
  const body=document.getElementById(id)?.querySelector('.sec-body');
  const tog=document.getElementById('tog-'+id);
  if(!body)return;
  body.classList.toggle('open');tog?.classList.toggle('open');
}

function renderEmpty(){
  document.getElementById('mainContent').innerHTML=`
    <div class="no-data">
      <div class="no-data-icon">⚙️</div>
      <div class="no-data-title">ยังไม่มี EA Settings</div>
      <div class="no-data-sub">รัน EA ใหม่หลังติดตั้งไฟล์ที่อัพเดตแล้ว<br>ระบบจะส่ง Settings มาอัตโนมัติ</div>
    </div>`;
}
</script>
</body>
</html>
