<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ARISx QUANT — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
:root{
  --purple:#6366f1;--purple-d:rgba(99,102,241,.12);--purple-g:rgba(99,102,241,.3);
  --green:#10b981;--red:#f43f5e;--red-d:rgba(244,63,94,.1);
  --txt:#f1f5f9;--txt-dim:#475569;
}
body{background:#060608;color:var(--txt);font-family:'DM Sans',sans-serif;position:relative;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.008) 2px,rgba(255,255,255,.008) 4px);pointer-events:none;z-index:1}

/* canvas bg */
#cv{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* top bar */
.topbar{position:fixed;top:0;left:0;right:0;padding:18px 32px;display:flex;justify-content:space-between;align-items:center;z-index:20;background:linear-gradient(to bottom,rgba(6,6,8,.8),transparent)}
.tb-logo{display:flex;align-items:center;gap:9px}
.tb-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--purple),#8b5cf6);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;font-family:'DM Mono',monospace}
.tb-name{font-size:16px;font-weight:600;color:#fff;letter-spacing:-.2px}
.tb-status{display:flex;align-items:center;gap:6px;font-size:9.5px;font-family:'DM Mono',monospace;color:rgba(16,185,129,.85);letter-spacing:.5px}
.tb-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:ping 1.5s ease infinite}
@keyframes ping{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}

/* center form */
.center{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:20;padding:80px 20px 100px}
.glass{
  background:rgba(8,9,16,.8);
  border:1px solid rgba(99,102,241,.18);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  padding:40px 44px;width:100%;max-width:400px;
  position:relative;
  clip-path:polygon(0 0,calc(100% - 22px) 0,100% 22px,100% 100%,22px 100%,0 calc(100% - 22px));
  box-shadow:0 0 80px rgba(99,102,241,.07),0 0 160px rgba(99,102,241,.04),inset 0 1px 0 rgba(255,255,255,.05);
  animation:cardIn .6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}

/* corner accents */
.gc{position:absolute;width:16px;height:16px;animation:gcPulse 3s ease-in-out infinite}
.gc-tl{top:-1px;left:-1px;border-top:1px solid rgba(99,102,241,.7);border-left:1px solid rgba(99,102,241,.7);animation-delay:0s}
.gc-tr{top:-1px;right:-1px;border-top:1px solid rgba(99,102,241,.7);border-right:1px solid rgba(99,102,241,.7);animation-delay:.75s}
.gc-bl{bottom:-1px;left:-1px;border-bottom:1px solid rgba(99,102,241,.7);border-left:1px solid rgba(99,102,241,.7);animation-delay:1.5s}
.gc-br{bottom:-1px;right:-1px;border-bottom:1px solid rgba(99,102,241,.7);border-right:1px solid rgba(99,102,241,.7);animation-delay:2.25s}
@keyframes gcPulse{0%,100%{opacity:.5}50%{opacity:1}}

/* card logo */
.c-logo{font-size:32px;font-weight:600;color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:3px}
.c-logo em{color:transparent;-webkit-text-stroke:1.5px rgba(99,102,241,.65);font-style:normal}
.c-sub{font-size:9px;letter-spacing:3px;color:rgba(255,255,255,.18);text-transform:uppercase;font-family:'DM Mono',monospace;margin-bottom:26px}

/* secure badge */
.sec-badge{display:flex;align-items:center;gap:7px;margin-bottom:24px;padding:6px 12px;background:rgba(16,185,129,.06);border:1px solid rgba(16,185,129,.14);width:fit-content;clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%)}
.sec-dot{width:5px;height:5px;background:var(--green);border-radius:50%;animation:ping 1.5s ease infinite}
.sec-txt{font-size:9px;color:var(--green);font-family:'DM Mono',monospace;letter-spacing:.5px}

/* tabs */
.tabs{display:flex;gap:3px;margin-bottom:22px}
.tab{flex:1;padding:9px;font-size:11px;cursor:pointer;color:rgba(255,255,255,.22);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);font-family:'DM Mono',monospace;text-align:center;letter-spacing:.5px;transition:all .2s;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.tab.on{background:rgba(99,102,241,.15);color:#a5b4fc;border-color:rgba(99,102,241,.28)}

/* alert */
.alert{display:none;padding:10px 14px;margin-bottom:14px;font-size:11px;font-family:'DM Mono',monospace;animation:cardIn .25s ease;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,0 100%)}
.alert.err{background:var(--red-d);border:1px solid rgba(244,63,94,.2);color:var(--red)}
.alert.ok{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.18);color:var(--green)}
.alert.show{display:block}

/* form */
.fg{margin-bottom:14px}
.fl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.22);font-family:'DM Mono',monospace;margin-bottom:6px;display:block}
.fi{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);padding:11px 14px;color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:all .2s;clip-path:polygon(0 0,100% 0,100% 100%,0 100%)}
.fi:focus{border-color:rgba(99,102,241,.45);background:rgba(99,102,241,.05)}
.fi::placeholder{color:rgba(255,255,255,.1)}

/* button */
.sbtn{width:100%;background:linear-gradient(135deg,#4f52c8,#6366f1,#8b5cf6);background-size:200% 100%;color:#fff;border:none;padding:13px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.5px;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%);margin-top:4px;position:relative;overflow:hidden;transition:background-position .4s,transform .15s}
.sbtn:hover{background-position:100% 0}
.sbtn:active{transform:scale(.99)}
.sbtn:disabled{opacity:.45;cursor:not-allowed}
.sbtn::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.11),transparent);animation:sw 2.5s ease-in-out infinite}
@keyframes sw{0%{left:-60%}70%,100%{left:110%}}
.spin{display:inline-block;width:12px;height:12px;border:1.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:rot .6s linear infinite;margin-right:7px;vertical-align:middle}
@keyframes rot{to{transform:rotate(360deg)}}

/* divider + footer */
.fdiv{display:flex;align-items:center;gap:10px;margin:16px 0;color:rgba(255,255,255,.12);font-size:9px;font-family:'DM Mono',monospace}
.fdiv::before,.fdiv::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.06)}
.ffoot{text-align:center;font-size:10.5px;color:rgba(255,255,255,.2);font-family:'DM Mono',monospace;line-height:1.7}
.ffoot a{color:rgba(99,102,241,.75);text-decoration:none;transition:color .15s}
.ffoot a:hover{color:#a5b4fc}

/* bottom stats bar */
.bstats{position:fixed;bottom:0;left:0;right:0;padding:16px 32px;display:flex;justify-content:space-between;align-items:center;z-index:20;background:linear-gradient(to top,rgba(6,6,8,.85),transparent)}
.bs-row{display:flex;gap:32px}
.bs-item .bs-lbl{font-size:8px;letter-spacing:2px;color:rgba(255,255,255,.14);font-family:'DM Mono',monospace;text-transform:uppercase;margin-bottom:2px}
.bs-item .bs-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace}
.v-g{color:rgba(16,185,129,.8)}.v-p{color:rgba(165,180,252,.7)}.v-a{color:rgba(245,158,11,.7)}
.bs-copy{font-size:8.5px;color:rgba(255,255,255,.08);font-family:'DM Mono',monospace;letter-spacing:1px}

/* mobile */
@media(max-width:480px){
  .glass{padding:28px 24px}
  .topbar{padding:14px 16px}
  .bstats{padding:12px 16px}
  .bs-row{gap:18px}
  .bs-copy{display:none}
}
</style>
</head>

<canvas id="cv"></canvas>

<!-- TOP BAR -->
<div class="topbar">
  <div class="tb-logo">

  </div>

</div>

<!-- GLASS FORM -->
<div class="center">
  <div class="glass">
    <div class="gc gc-tl"></div><div class="gc gc-tr"></div>
    <div class="gc gc-bl"></div><div class="gc gc-br"></div>

    <div class="c-logo">ARIS<em>x</em></div>

      <button class="sbtn" id="regBtn" onclick="doRegister()">CREATE ACCOUNT →</button>
      <div class="ffoot" style="margin-top:14px">มีบัญชีแล้ว? <a href="#" onclick="sw('login')">เข้าสู่ระบบ</a></div>

  </div>
</div>

<!-- BOTTOM STATS -->
<div class="bstats">
  <div class="bs-row">
    <div class="bs-item"><div class="bs-lbl">Today P/L</div><div class="bs-val v-g" id="bsPnl">+$0</div></div>
    <div class="bs-item"><div class="bs-lbl">Active Traders</div><div class="bs-val v-p" id="bsTraders">—</div></div>

  </div>
  <div class="bs-copy">ARIS-CO.COM · SIGNAL DARK V2</div>
</div>

<script>
/* ══ SUPABASE ══ */
const SB_URL="https://tfnikhovkbbrhvrkobpu.supabase.co";
const SB_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo";
const sbc=supabase.createClient(SB_URL,SB_KEY);

/* redirect if already logged in */
(async()=>{const{data:{session}}=await sbc.auth.getSession();if(session)window.location.replace('index.html');})();

/* ══ LIVE STATS (fetch from Supabase) ══ */
async function loadStats(){
  try{
    /* Today P/L from trade_history CLOSE rows today */
    const today=new Date();today.setHours(0,0,0,0);
    const{data}=await sbc.from('trade_history').select('profit').eq('trade_action','CLOSE').gte('created_at',today.toISOString());
    if(data&&data.length){
      const pnl=data.reduce((a,r)=>a+(+r.profit||0),0);
      const el=document.getElementById('bsPnl');
      el.textContent=(pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(2);
      el.className='bs-val '+(pnl>=0?'v-g':'v-r');
      el.style.color=pnl>=0?'rgba(16,185,129,.8)':'rgba(244,63,94,.8)';
    }
    /* Active traders = count distinct license_keys with user_id */
    const{data:lk}=await sbc.from('license_keys').select('user_id').not('user_id','is',null);
    if(lk)document.getElementById('bsTraders').textContent=lk.length;
  }catch(e){}
}
loadStats();

/* ══ LIGHTNING CANVAS ══ */
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

function rand(a,b){return a+Math.random()*(b-a)}

function boltPath(x1,y1,x2,y2,r,d){
  if(d===0){ctx.lineTo(x2,y2);return}
  const mx=(x1+x2)/2+(y2-y1)*rand(-.5,.5)*r;
  const my=(y1+y2)/2+(x1-x2)*rand(-.5,.5)*r;
  boltPath(x1,y1,mx,my,r*.62,d-1);
  boltPath(mx,my,x2,y2,r*.62,d-1);
}

function drawBolt(sx,sy,ex,ey,alpha,w,col){
  const c=col||`rgba(139,92,246,${alpha})`;
  /* outer glow */
  ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w*5;ctx.globalAlpha=alpha*.08;ctx.shadowBlur=50;ctx.shadowColor=c;
  ctx.beginPath();ctx.moveTo(sx,sy);boltPath(sx,sy,ex,ey,.4,7);ctx.stroke();ctx.restore();
  /* mid */
  ctx.save();ctx.strokeStyle=c;ctx.lineWidth=w*1.8;ctx.globalAlpha=alpha*.25;ctx.shadowBlur=25;ctx.shadowColor=c;
  ctx.beginPath();ctx.moveTo(sx,sy);boltPath(sx,sy,ex,ey,.4,7);ctx.stroke();ctx.restore();
  /* core white */
  ctx.save();ctx.strokeStyle=`rgba(235,225,255,${alpha*.9})`;ctx.lineWidth=w*.35;ctx.shadowBlur=6;ctx.shadowColor=c;
  ctx.beginPath();ctx.moveTo(sx,sy);boltPath(sx,sy,ex,ey,.4,7);ctx.stroke();ctx.restore();
}

/* particles */
const pts=[];
for(let i=0;i<55;i++)pts.push({
  x:rand(0,window.innerWidth),y:rand(0,window.innerHeight),
  r:rand(.3,1.8),spd:rand(.1,.55),
  op:rand(.03,.22),col:Math.random()>.5?'99,102,241':'139,92,246'
});

let bolts=[],bTick=0,frame=0;
const mouse={x:-999,y:-999};
document.addEventListener('mousemove',e=>{mouse.x=e.clientX;mouse.y=e.clientY;});
document.addEventListener('mouseleave',()=>{mouse.x=-999;});

function spawnBolt(){
  const W=cv.width,H=cv.height,cx=W/2,cy=H/2;
  /* always from edge toward center area */
  const origins=[
    {sx:rand(0,W*.15),sy:rand(0,H*.15)},   /* top-left corner */
    {sx:rand(W*.85,W),sy:rand(0,H*.15)},   /* top-right corner */
    {sx:rand(0,W*.15),sy:rand(H*.85,H)},   /* bottom-left corner */
    {sx:rand(W*.85,W),sy:rand(H*.85,H)},   /* bottom-right corner */
    {sx:rand(0,W*.1),sy:rand(H*.3,H*.7)},  /* left mid */
    {sx:rand(W*.9,W),sy:rand(H*.3,H*.7)},  /* right mid */
    {sx:rand(W*.3,W*.7),sy:rand(0,H*.05)}, /* top mid */
    {sx:rand(W*.3,W*.7),sy:rand(H*.95,H)}, /* bottom mid */
  ];
  const o=origins[Math.floor(Math.random()*origins.length)];
  const ex=cx+rand(-120,120),ey=cy+rand(-100,100);
  const life=Math.round(rand(14,28));
  bolts.push({...o,ex,ey,life,maxLife:life,w:rand(.7,2),alpha:rand(.5,.9)});
  /* branch bolt */
  if(Math.random()>.4){
    const bx=o.sx+(ex-o.sx)*rand(.3,.65),by=o.sy+(ey-o.sy)*rand(.3,.65);
    const bl=Math.round(rand(8,18));
    bolts.push({sx:bx,sy:by,ex:bx+rand(-90,90),ey:by+rand(-90,90),life:bl,maxLife:bl,w:.5,alpha:.4});
  }
}

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  const W=cv.width,H=cv.height;

  /* vignette */
  const vig=ctx.createRadialGradient(W/2,H/2,H*.05,W/2,H/2,H*.95);
  vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(0,0,0,.75)');
  ctx.fillStyle=vig;ctx.fillRect(0,0,W,H);

  /* center ambient */
  const cg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.45);
  cg.addColorStop(0,'rgba(99,102,241,.06)');cg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);

  /* particles */
  pts.forEach(p=>{
    p.y-=p.spd;if(p.y<-4){p.y=H+4;p.x=rand(0,W)}
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.col},${p.op})`;ctx.fill();
  });

  /* subtle grid */
  ctx.save();ctx.strokeStyle='rgba(99,102,241,.025)';ctx.lineWidth=.5;
  for(let x=0;x<W;x+=70){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=70){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  /* spawn bolts */
  bTick++;if(bTick>rand(5,14)){bTick=0;spawnBolt();if(Math.random()>.5)spawnBolt();}

  /* mouse interaction — thin bolt from all 4 corners to mouse */
  if(mouse.x>0&&frame%3===0){
    [[0,0],[W,0],[0,H],[W,H]].forEach(([cx,cy],i)=>{
      if(i%2===frame%2){
        drawBolt(cx,cy,mouse.x,mouse.y,.28,.6,'rgba(99,102,241,.45)');
      }
    });
  }

  /* active bolts */
  bolts=bolts.filter(b=>b.life>0);
  bolts.forEach(b=>{
    const t=b.life/b.maxLife;
    drawBolt(b.sx,b.sy,b.ex,b.ey,b.alpha*t,b.w);
    b.life--;
  });

  /* impact flash at center */
  if(frame%50<2){
    const fx=W/2+rand(-80,80),fy=H/2+rand(-60,60);
    ctx.save();ctx.globalAlpha=rand(.25,.55);
    const fl=ctx.createRadialGradient(fx,fy,0,fx,fy,rand(25,55));
    fl.addColorStop(0,'rgba(210,200,255,.9)');fl.addColorStop(1,'rgba(99,102,241,0)');
    ctx.fillStyle=fl;ctx.beginPath();ctx.arc(fx,fy,55,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  frame++;requestAnimationFrame(draw);
}
draw();

/* ══ UI ══ */
function sw(t){
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('regForm').style.display=t==='register'?'block':'none';
  document.getElementById('tab-login').className='tab'+(t==='login'?' on':'');
  document.getElementById('tab-reg').className='tab'+(t==='register'?' on':'');
  hideAlert();
}
function showAlert(msg,type){const el=document.getElementById('alertBox');el.textContent=msg;el.className='alert '+type+' show'}
function hideAlert(){document.getElementById('alertBox').className='alert'}

async function doLogin(){
  const email=document.getElementById('lEmail').value.trim();
  const pass=document.getElementById('lPass').value;
  if(!email||!pass){showAlert('กรุณาใส่ Email และ Password','err');return}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>กำลังเข้าสู่ระบบ…';
  hideAlert();
  const{error}=await sbc.auth.signInWithPassword({email,password:pass});
  if(error){
    showAlert(error.message.includes('Invalid')?'Email หรือ Password ไม่ถูกต้อง':error.message,'err');
    btn.disabled=false;btn.innerHTML='SIGN IN →';
  } else {
    showAlert('✓ เข้าสู่ระบบสำเร็จ กำลังโหลด…','ok');
    setTimeout(()=>window.location.replace('index.html'),700);
  }
}

async function doRegister(){
  const name=document.getElementById('rName').value.trim();
  const email=document.getElementById('rEmail').value.trim();
  const pass=document.getElementById('rPass').value;
  const key=document.getElementById('rKey').value.trim().toUpperCase();
  if(!name||!email||!pass||!key){showAlert('กรุณากรอกข้อมูลให้ครบ','err');return}
  if(pass.length<8){showAlert('Password ต้องมีอย่างน้อย 8 ตัวอักษร','err');return}
  const btn=document.getElementById('regBtn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>กำลังสร้างบัญชี…';
  hideAlert();
  const{data:kd,error:ke}=await sbc.from('license_keys').select('user_id').eq('license_key',key).single();
  if(ke||!kd){showAlert('License Key ไม่ถูกต้อง กรุณาติดต่อผู้ดูแล','err');btn.disabled=false;btn.innerHTML='CREATE ACCOUNT →';return}
  if(kd.user_id){showAlert('License Key นี้ถูกใช้งานแล้ว','err');btn.disabled=false;btn.innerHTML='CREATE ACCOUNT →';return}
  const{data:au,error:ae}=await sbc.auth.signUp({email,password:pass,options:{data:{display_name:name}}});
  if(ae){showAlert(ae.message,'err');btn.disabled=false;btn.innerHTML='CREATE ACCOUNT →';return}
  await sbc.from('license_keys').update({user_id:au.user.id,display_name:name}).eq('license_key',key);
  showAlert('✓ สร้างบัญชีสำเร็จ! กรุณาตรวจสอบ Email เพื่อยืนยัน','ok');
  btn.disabled=false;btn.innerHTML='CREATE ACCOUNT →';
}

async function forgotPwd(){
  const email=document.getElementById('lEmail').value.trim();
  if(!email){showAlert('กรุณาใส่ Email ก่อน','err');return}
  const{error}=await sbc.auth.resetPasswordForEmail(email,{redirectTo:'https://aris-co.com/login.html'});
  if(error)showAlert(error.message,'err');
  else showAlert('✓ ส่ง Email รีเซ็ตรหัสผ่านแล้ว กรุณาตรวจสอบ Email','ok');
}
</script>
