<style>
/* ── BASE & RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { overflow-x: hidden; max-width: 100vw; }
:root {
  --bg: #060608; --s1: #0a0b10; --s2: #111420;
  --purple: #6366f1; --purple-d: rgba(99,102,241,0.12);
  --green: #10b981; --red: #f43f5e; --amber: #f59e0b; --blue: #38bdf8;
  --border2: rgba(255,255,255,0.06);
  --txt: #f1f5f9; --txt-mid: #94a3b8; --txt-dim: #475569;
  --radius: 12px;
}
body { background: var(--bg); color: var(--txt); font-family: 'DM Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }
body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99,102,241,0.08), transparent); pointer-events: none; z-index: 0; }

/* ── SIDEBAR (ใช้รูปแบบเดียวกัน) ── */
.sidebar { width: 260px; background: var(--s1); border-right: 1px solid var(--border2); display: flex; flex-direction: column; z-index: 20; }
.sb-top { padding: 24px 20px 20px; border-bottom: 1px solid var(--border2); }
.logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.logo-mark { width: 36px; height: 36px; border-radius: 8px; background: linear-gradient(135deg, var(--purple), #8b5cf6); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; font-family: 'DM Mono', monospace; }
.logo-name { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.4px; }
.logo-sub { font-size: 9px; letter-spacing: 2px; color: var(--txt-dim); text-transform: uppercase; font-family: 'DM Mono', monospace; margin-top: 2px; }

.sb-nav { padding: 16px 12px; }
.nav-sect { font-size: 9px; letter-spacing: 2px; color: var(--txt-dim); text-transform: uppercase; font-family: 'DM Mono', monospace; padding: 0 12px; margin-bottom: 8px; }
.nav-btn { display: flex; align-items: center; gap: 10px; padding: 10px 12px; cursor: pointer; color: var(--txt-dim); font-size: 13px; font-weight: 500; text-decoration: none; border-radius: 8px; margin-bottom: 4px; border: 1px solid transparent; transition: all 0.2s; }
.nav-btn:hover { background: rgba(255,255,255,0.04); color: var(--txt); }
.nav-btn.active { background: var(--purple-d); color: #a5b4fc; border-color: rgba(99,102,241,0.15); box-shadow: inset 3px 0 0 var(--purple); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }

.sb-accs { flex: 1; overflow-y: auto; padding: 0 12px 12px; }
.acc-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; cursor: pointer; color: var(--txt-dim); font-size: 12px; font-weight: 500; border-radius: 8px; transition: all 0.2s; }
.acc-item:hover { background: rgba(255,255,255,0.04); color: var(--txt); }
.acc-item.active { background: var(--purple-d); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.15); box-shadow: inset 3px 0 0 var(--purple); }
.acc-av { width: 28px; height: 28px; background: rgba(255,255,255,0.06); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--txt-mid); font-family: 'DM Mono', monospace; }
.acc-item.active .acc-av { background: rgba(99,102,241,0.2); color: #a5b4fc; }

/* ── MAIN CONTENT ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; z-index: 5; position: relative; }
.topbar { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; border-bottom: 1px solid var(--border2); background: rgba(6,6,8,0.7); backdrop-filter: blur(24px); z-index: 10; }
.page-title { font-size: 18px; font-weight: 600; color: #fff; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
.page-sub { font-size: 10px; color: var(--txt-dim); margin-top: 4px; font-family: 'DM Mono', monospace; text-transform: uppercase; letter-spacing: 1px; }

.topbar-r { display: flex; align-items: center; gap: 10px; }
.chip { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); padding: 6px 14px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--txt-mid); border-radius: 6px; cursor: pointer; transition: all 0.2s; text-decoration: none; }
.chip:hover { background: rgba(255,255,255,0.08); color: var(--txt); }
.logout-chip { background: rgba(244,63,94,0.08) !important; border-color: rgba(244,63,94,0.2) !important; color: var(--red) !important; }

.content { flex: 1; overflow-y: auto; padding: 24px 32px; }

/* ── SUMMARY CARDS ── */
.sum-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.sc { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.06); padding: 20px; border-radius: var(--radius); position: relative; overflow: hidden; transition: all 0.25s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.sc:hover { transform: translateY(-3px); border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); box-shadow: 0 8px 24px rgba(0,0,0,0.2); }
.sc-c { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; opacity: 0.8; }
.sc.bl .sc-c { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
.sc.gr .sc-c { background: linear-gradient(90deg, transparent, var(--green), transparent); }
.sc.pu .sc-c { background: linear-gradient(90deg, transparent, var(--purple), transparent); }
.sc.am .sc-c { background: linear-gradient(90deg, transparent, var(--amber), transparent); }
.sc-lbl { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--txt-dim); font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.sc-val { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; color: #fff; }
.sc.bl .sc-val { color: var(--blue); text-shadow: 0 0 12px rgba(56,189,248,0.2); }
.sc.gr .sc-val { color: var(--green); text-shadow: 0 0 12px rgba(16,185,129,0.2); }
.sc.pu .sc-val { color: #a5b4fc; }
.sc.am .sc-val { color: var(--amber); }

/* ── CHARTS & TABLES ── */
.grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
.card-box { background: rgba(255,255,255,0.015); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
.card-title { font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 16px; }

.trade-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-family: 'DM Mono', monospace; font-size: 12px; }
.trade-row:last-child { border-bottom: none; }
.tr-sym { font-weight: 600; color: var(--txt); }
.tr-time { font-size: 10px; color: var(--txt-dim); }
.tr-pnl.pos { color: var(--green); }
.tr-pnl.neg { color: var(--red); }

/* ── MOBILE ── */
.mob-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,11,16,0.95); border-top: 1px solid var(--border2); z-index: 100; padding: 10px 0; backdrop-filter: blur(12px); }
.mob-nav-inner { display: flex; justify-content: space-around; }
.mob-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 6px 12px; cursor: pointer; color: var(--txt-dim); font-size: 10px; text-decoration: none; }
.mob-btn.active { color: #a5b4fc; }
@media (max-width: 860px) {
  .sidebar { position: fixed; left: -260px; height: 100%; transition: left 0.3s; }
  .main { padding-bottom: 70px; }
  .mob-nav { display: block; }
  .topbar { padding: 16px 20px; }
  .content { padding: 16px; }
  .sum-row { grid-template-columns: 1fr 1fr; }
  .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="logo-row">
      <div class="logo-mark">Ax</div>
      <div>
        <div class="logo-name">ARISx QUANT</div>
        <div class="logo-sub">Signal · Dark</div>
      </div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="nav-sect">Navigation</div>
    <a class="nav-btn active" href="index.html">▣ Dashboard</a>
    <a class="nav-btn" href="time-analysis.html">◈ Time Analysis</a>
    <a class="nav-btn" href="calendar.html">📅 Calendar</a>
    <a class="nav-btn" href="statement.html">💰 Statement</a>
  </div>
  <div class="sb-accs">
    <div class="nav-sect" style="margin-bottom:8px">License Keys</div>
    <div id="accList"></div>
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <div>
      <div class="page-title">▣ Dashboard</div>
      <div class="page-sub" id="pageSub">REAL-TIME OVERVIEW</div>
    </div>
    <div class="topbar-r">
      <button class="chip logout-chip" onclick="doLogout()">⏻ Logout</button>
    </div>
  </div>

  <div class="content">
    <div class="sum-row">
      <div class="sc bl"><div class="sc-c"></div><div class="sc-lbl">Balance</div><div class="sc-val" id="vBal">$0.00</div></div>
      <div class="sc gr"><div class="sc-c"></div><div class="sc-lbl">Equity</div><div class="sc-val" id="vEq">$0.00</div></div>
      <div class="sc pu"><div class="sc-c"></div><div class="sc-lbl">Total Trades</div><div class="sc-val" id="vTrd">0</div></div>
      <div class="sc am"><div class="sc-c"></div><div class="sc-lbl">Win Rate</div><div class="sc-val" id="vWr">0%</div></div>
    </div>

    <div class="grid-2">
      <div class="card-box">
        <div class="card-title">📈 Equity Growth</div>
        <div style="position:relative; height:300px; width:100%;"><canvas id="eqChart"></canvas></div>
      </div>
      <div class="card-box">
        <div class="card-title">⚡ Recent Closed Trades</div>
        <div id="recentTrades" style="max-height: 300px; overflow-y: auto; padding-right: 8px;">
          </div>
      </div>
    </div>
  </div>
</div>

<div class="mob-nav">
  <div class="mob-nav-inner">
    <a class="mob-btn active" href="index.html">▣ Dashboard</a>
    <a class="mob-btn" href="time-analysis.html">◈ Time Analysis</a>
    <a class="mob-btn" href="calendar.html">📅 Calendar</a>
  </div>
</div>

<script>
let eqChartIns = null;

function dedupeTrades(rows) {
  const seen = new Set();
  return rows.filter(r => {
    if ((r.trade_action || '').toUpperCase() !== 'CLOSE') return false;
    const min = (r.created_at || '').slice(0, 16);
    const fp = `${r.license_key || ''}|${r.symbol || ''}|${(+r.profit || 0).toFixed(2)}|${(+r.account_balance || 0).toFixed(2)}|${min}`;
    if (seen.has(fp)) return false;
    seen.add(fp);
    return true;
  });
}

(async()=>{
  const {data:{session}} = await sbc.auth.getSession();
  if(!session) { window.location.replace('login.html'); return; }
  const {data:lk} = await sbc.from('license_keys').select('license_key,is_admin').eq('user_id',session.user.id).single();
  window._isAdmin = lk?.is_admin || false;
  window._myLicenseKey = lk?.license_key || '';
  loadDashboardData();
})();

async function loadDashboardData(){
  let q = sbc.from('trade_history').select('*').order('created_at',{ascending:true});
  if(!window._isAdmin && window._myLicenseKey) q = q.eq('license_key', window._myLicenseKey);
  const {data} = await q;
  
  // ใช้ตัวกรองซ้ำเหมือนกัน
  all = data || []; 
  buildSidebar();
  renderDashboard();
}

function buildSidebar(){
  if(window._isAdmin){
    const keys = [...new Set(all.map(r=>r.license_key).filter(Boolean))].sort();
    let h = acc('All','G','Global Overview');
    keys.forEach(k => h += acc(k,k[0].toUpperCase(),k));
    document.getElementById('accList').innerHTML = h;
  } else {
    curKey = window._myLicenseKey;
    document.getElementById('accList').innerHTML = acc(curKey,curKey[0].toUpperCase(),curKey);
  }
}

function acc(key,l,name){
  return `<div class="acc-item${curKey===key?' active':''}" onclick="setKey('${key}')">
    <div class="acc-av">${l}</div><span style="font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${name}</span>
  </div>`;
}

function setKey(k){ curKey=k; document.getElementById('pageSub').textContent=(k==='All'?'ALL KEYS':k)+' · OVERVIEW'; buildSidebar(); renderDashboard(); }

function renderDashboard(){
  let fil = (window._isAdmin && curKey !== 'All') ? all.filter(x=>x.license_key===curKey) : all;
  
  // ยอดปัจจุบันหาจากออร์เดอร์ล่าสุด
  const lastRow = fil.length ? fil[fil.length-1] : null;
  document.getElementById('vBal').textContent = lastRow ? '$' + (+lastRow.account_balance||0).toFixed(2) : '$0.00';
  document.getElementById('vEq').textContent = lastRow ? '$' + (+lastRow.account_equity||0).toFixed(2) : '$0.00';

  // สรุปข้อมูล (เฉพาะออร์เดอร์ Close เท่านั้นเพื่อหา Win rate)
  const closed = dedupeTrades(fil);
  const wins = closed.filter(r => (+r.profit||0) > 0).length;
  const wr = closed.length ? Math.round(wins/closed.length * 100) : 0;
  
  document.getElementById('vTrd').textContent = closed.length;
  document.getElementById('vWr').textContent = wr + '%';

  // อัพเดท Chart (สะสม PNL)
  renderChart(closed);

  // อัพเดทตาราง Recent Trades (แสดง 10 รายการล่าสุด)
  const recent = [...closed].reverse().slice(0, 10);
  document.getElementById('recentTrades').innerHTML = recent.map(r => {
    const p = +r.profit || 0;
    const isPos = p >= 0;
    const d = new Date(r.created_at);
    const mm = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    const hh = String(d.getHours()).padStart(2,'0'), min = String(d.getMinutes()).padStart(2,'0');
    
    return `<div class="trade-row">
      <div>
        <div class="tr-sym">${r.symbol || 'Unknown'}</div>
        <div class="tr-time">${dd}/${mm} ${hh}:${min}</div>
      </div>
      <div class="tr-pnl ${isPos?'pos':'neg'}">${isPos?'+':''}$${Math.abs(p).toFixed(2)}</div>
    </div>`;
  }).join('');
}

function renderChart(closedData){
  let run = 0;
  const labels = [];
  const eqData = [];
  
  closedData.forEach((r, i) => {
    run += (+r.profit || 0);
    labels.push(`Trade #${i+1}`);
    eqData.push(run.toFixed(2));
  });

  if(eqChartIns) eqChartIns.destroy();
  const ctx = document.getElementById('eqChart').getContext('2d');
  
  Chart.defaults.color = '#94a3b8';
  Chart.defaults.font.family = "'DM Mono', monospace";
  
  eqChartIns = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Cumulative P/L ($)',
        data: eqData,
        borderColor: '#10b981',
        backgroundColor: 'rgba(16,185,129,0.1)',
        borderWidth: 2,
        fill: true,
        pointRadius: 0,
        pointHoverRadius: 4,
        tension: 0.1
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { display: false } },
      scales: {
        x: { display: false },
        y: { grid: { color: 'rgba(255,255,255,0.03)' } }
      }
    }
  });
}

async function doLogout(){ await sbc.auth.signOut(); window.location.replace('login.html'); }
</script>
</body>
