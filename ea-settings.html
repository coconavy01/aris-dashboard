<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100vw}
body{visibility:hidden;opacity:0}
:root{
  --bg:#060608;--s1:#0c0e14;--s2:#111420;--s3:#161926;
  --purple:#6366f1;--purple-d:rgba(99,102,241,.12);--purple-g:rgba(99,102,241,.28);
  --green:#10b981;--green-d:rgba(16,185,129,.1);
  --red:#f43f5e;--red-d:rgba(244,63,94,.1);
  --amber:#f59e0b;--amber-d:rgba(245,158,11,.1);
  --blue:#38bdf8;--blue-d:rgba(56,189,248,.1);
  --teal:#06b6d4;--teal-d:rgba(6,182,212,.1);
  --border2:rgba(255,255,255,.04);
  --txt:#f1f5f9;--txt-mid:#94a3b8;--txt-dim:#475569;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.009) 2px,rgba(255,255,255,.009) 4px);pointer-events:none;z-index:0}

/* glow */
.glow{position:fixed;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,.05) 0%,transparent 70%);top:-150px;right:50px;pointer-events:none;z-index:0;animation:drift 10s ease-in-out infinite alternate}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(30px,20px)}}

/* SIDEBAR */
.sidebar{width:260px;min-width:260px;background:var(--s1);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:relative;z-index:20;overflow:hidden}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--purple-g),transparent)}
.sb-top{padding:28px 22px 20px;border-bottom:1px solid var(--border2)}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--purple),#8b5cf6);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0}
.logo-name{font-size:19px;font-weight:600;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:9.5px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:1px}
.live-pill{display:flex;align-items:center;gap:6px;margin-top:14px;padding:6px 12px;background:var(--green-d);border:1px solid rgba(16,185,129,.18);font-size:10px;font-family:'DM Mono',monospace;color:var(--green);letter-spacing:.5px;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:ping 1.5s ease infinite}
@keyframes ping{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.sb-nav{padding:18px 14px 8px}
.nav-sect{font-size:9px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;padding:0 8px;margin-bottom:8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;transition:all .15s;color:var(--txt-dim);font-size:13px;font-weight:500;text-decoration:none;border:1px solid transparent;margin-bottom:2px;position:relative;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.nav-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--purple);transform:scaleY(0);transition:transform .15s}
.nav-btn:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.nav-btn.active{background:var(--purple-d);color:#a5b4fc;border-color:rgba(99,102,241,.18)}
.nav-btn.active::before{transform:scaleY(1)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-accs{flex:1;overflow-y:auto;padding:4px 14px 14px}
.sb-accs::-webkit-scrollbar{width:2px}
.acc-item{display:flex;align-items:center;gap:9px;padding:9px 10px;cursor:pointer;transition:all .15s;margin-bottom:2px;color:var(--txt-dim);font-size:12px;font-weight:500;border:1px solid transparent;clip-path:polygon(0 0,calc(100% - 7px) 0,100% 7px,100% 100%,0 100%)}
.acc-item:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.acc-item.active{background:var(--purple-d);color:#a5b4fc;border-color:rgba(99,102,241,.18)}
.acc-av{width:26px;height:26px;background:var(--s3);clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--txt-dim);font-family:'DM Mono',monospace;flex-shrink:0}
.acc-item.active .acc-av{background:var(--purple-d);color:#a5b4fc}
.sb-foot{padding:14px 22px;border-top:1px solid var(--border2)}
.lat-row{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--txt-dim)}
.lat-v{color:var(--blue);font-weight:500}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;z-index:5}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:1px solid var(--border2);background:rgba(6,6,8,.92);backdrop-filter:blur(16px);flex-shrink:0;position:relative;z-index:10}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--purple-g),transparent)}
.page-title{font-size:20px;font-weight:600;color:#fff;letter-spacing:-.3px}
.page-sub{font-size:10px;color:var(--txt-dim);margin-top:2px;font-family:'DM Mono',monospace}
.topbar-r{display:flex;align-items:center;gap:8px}
.chip{background:var(--s2);border:1px solid var(--border2);padding:6px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--txt-mid);clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);text-decoration:none;transition:all .15s;cursor:pointer}
.chip:hover{border-color:rgba(255,255,255,.1);color:var(--txt)}
.logout-chip{background:var(--red-d);border-color:rgba(244,63,94,.2);color:var(--red)}
.admin-chip{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.06));border-color:rgba(245,158,11,.4);color:var(--amber);font-weight:600;animation:ag 2s ease-in-out infinite alternate;text-decoration:none}
@keyframes ag{0%{box-shadow:0 0 6px rgba(245,158,11,.1)}100%{box-shadow:0 0 18px rgba(245,158,11,.25)}}
.content{flex:1;overflow-y:auto;padding:20px 28px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2)}

/* ══ SNAPSHOT + COMPARE BAR ══ */
.snap-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.snap-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;white-space:nowrap;padding:0 4px}
.snap-sel{flex:1;min-width:240px;background:rgba(255,255,255,.04);border:1px solid rgba(99,102,241,.2);padding:9px 14px;color:var(--txt);font-family:'DM Mono',monospace;font-size:12px;outline:none;cursor:pointer;border-radius:6px;transition:border-color .15s}
.snap-sel:focus{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.06)}
.snap-sel option{background:#0c0e14}
.snap-count{font-size:9.5px;font-family:'DM Mono',monospace;color:var(--txt-dim);padding:5px 12px;background:rgba(255,255,255,.04);border:1px solid var(--border2);border-radius:4px;white-space:nowrap}

.cmp-bar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:linear-gradient(135deg,rgba(99,102,241,.08),rgba(99,102,241,.03));border:1px solid rgba(99,102,241,.2);border-radius:8px;margin-bottom:16px;flex-wrap:wrap}
.cmp-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#a5b4fc;font-family:'DM Mono',monospace;white-space:nowrap}
.cmp-sel{flex:1;min-width:160px;background:rgba(255,255,255,.05);border:1px solid rgba(99,102,241,.2);padding:7px 12px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;outline:none;cursor:pointer;border-radius:5px;transition:all .15s}
.cmp-sel:focus{border-color:rgba(99,102,241,.5)}
.cmp-sel option{background:#0c0e14}
.cmp-btn{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.25);color:#a5b4fc;padding:7px 16px;font-size:10.5px;cursor:pointer;font-family:'DM Mono',monospace;border-radius:5px;transition:all .15s;font-weight:500;white-space:nowrap}
.cmp-btn:hover{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.5)}
.cmp-btn.active{background:rgba(99,102,241,.25);border-color:rgba(99,102,241,.55);box-shadow:0 0 12px rgba(99,102,241,.2)}
.cmp-clear{background:rgba(244,63,94,.08);border:1px solid rgba(244,63,94,.2);color:var(--red);padding:6px 12px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;border-radius:5px;transition:all .15s}
.cmp-clear:hover{background:rgba(244,63,94,.15)}
.diff-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;background:var(--amber-d);border:1px solid rgba(245,158,11,.25);font-size:10px;font-family:'DM Mono',monospace;color:var(--amber);border-radius:5px;font-weight:500}

/* ══ HERO CARD ══ */
.settings-hero{background:linear-gradient(135deg,rgba(255,255,255,.03) 0%,rgba(255,255,255,.015) 100%);border:1px solid rgba(255,255,255,.07);padding:24px 28px;margin-bottom:16px;position:relative;border-radius:10px;overflow:hidden}
.settings-hero::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--purple),rgba(139,92,246,.5),transparent)}
.sh-corner{display:none}
.sh-glow{position:absolute;top:-60px;right:-60px;width:260px;height:260px;background:radial-gradient(circle,rgba(99,102,241,.08) 0%,transparent 70%);pointer-events:none}
.sh-row{display:flex;align-items:flex-start;gap:24px;flex-wrap:wrap;position:relative;z-index:1}
.sh-key-block{}
.sh-key{font-size:30px;font-weight:700;color:#fff;font-family:'DM Mono',monospace;letter-spacing:-1px;line-height:1}
.sh-sym{font-size:13px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:5px;display:flex;align-items:center;gap:6px}
.sh-sym-dot{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 6px rgba(16,185,129,.5)}
.sh-meta{margin-left:auto;text-align:right;display:flex;flex-direction:column;gap:3px}
.sh-broker{font-size:11px;color:#a5b4fc;font-family:'DM Mono',monospace;letter-spacing:.3px}
.sh-balance{font-size:24px;font-weight:600;font-family:'DM Mono',monospace;color:var(--green);letter-spacing:-0.5px}
.sh-lever{font-size:10px;color:var(--txt-dim);font-family:'DM Mono',monospace}
.sh-tags{display:flex;gap:5px;margin-top:14px;flex-wrap:wrap;position:relative;z-index:1}
.tag{padding:4px 11px;font-size:9px;font-weight:500;font-family:'DM Mono',monospace;border-radius:20px;border:1px solid transparent;letter-spacing:.5px}
.tag-on{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.25);color:var(--green)}
.tag-off{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07);color:var(--txt-dim)}
.tag-info{background:rgba(99,102,241,.12);border-color:rgba(99,102,241,.25);color:#a5b4fc}
.tag-warn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.25);color:var(--amber)}

/* ══ SECTIONS ══ */
.sections{display:flex;flex-direction:column;gap:8px}
.section{background:rgba(255,255,255,.018);border:1px solid rgba(255,255,255,.06);overflow:hidden;border-radius:8px;transition:border-color .2s,box-shadow .2s}
.section:hover{border-color:rgba(255,255,255,.1);box-shadow:0 2px 20px rgba(0,0,0,.2)}
.sec-hd{display:flex;align-items:center;gap:10px;padding:12px 18px;cursor:pointer;user-select:none;background:rgba(255,255,255,.02)}
.sec-hd:hover{background:rgba(255,255,255,.035)}
.sec-icon{font-size:14px;flex-shrink:0}
.sec-title{font-size:10.5px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;font-family:'DM Mono',monospace;color:var(--txt-mid)}
.sec-count{margin-left:auto;font-size:9px;font-family:'DM Mono',monospace;color:var(--txt-dim);background:rgba(255,255,255,.06);padding:2px 9px;border-radius:10px}
.sec-toggle{font-size:11px;color:var(--txt-dim);transition:transform .25s;margin-left:6px}
.sec-toggle.open{transform:rotate(180deg)}
.sec-body{display:grid;grid-template-columns:repeat(4,1fr);overflow:hidden;max-height:0;transition:max-height .35s ease;border-top:0px solid var(--border2)}
.sec-body.open{max-height:800px;border-top-width:1px}

/* ══ PARAM CARD ══ */
.param{padding:14px 18px;border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;gap:3px;transition:background .12s;position:relative}
.param:hover{background:rgba(255,255,255,.03)}
.param:nth-child(4n){border-right:none}
.param-lbl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-bottom:1px}
.param-val{font-size:16px;font-weight:500;font-family:'DM Mono',monospace;color:var(--txt);line-height:1.2}
.param-val.val-on{color:var(--green)}.param-val.val-off{color:rgba(255,255,255,.2)}.param-val.val-amber{color:var(--amber)}.param-val.val-blue{color:var(--blue)}.param-val.val-purple{color:#a5b4fc}.param-val.val-red{color:var(--red)}

/* diff highlight */
.param.diff-changed{background:rgba(245,158,11,.04)!important}
.param.diff-changed::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--amber),transparent);border-radius:2px 0 0 2px}
.param.diff-changed .param-lbl{color:rgba(245,158,11,.7)}
.param.diff-changed .param-val{color:var(--amber)}
.param-cmp-row{display:flex;align-items:center;gap:5px;margin-top:5px;padding:4px 7px;background:rgba(245,158,11,.07);border-radius:4px}
.param-cmp-label{font-size:7.5px;letter-spacing:1px;text-transform:uppercase;color:rgba(245,158,11,.5);font-family:'DM Mono',monospace;white-space:nowrap}
.param-cmp-val{font-size:11px;font-weight:500;font-family:'DM Mono',monospace;color:rgba(245,158,11,.8)}
.param-cmp-arrow{font-size:9px;color:rgba(245,158,11,.4)}

/* ══ COLOR GUIDE ══ */
.color-guide{display:flex;flex-wrap:wrap;gap:8px;padding:12px 16px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);margin-top:10px;border-radius:6px;align-items:center}
.cg-item{display:flex;align-items:center;gap:5px;font-size:9px;font-family:'DM Mono',monospace;color:var(--txt-dim)}
.cg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* NO DATA */
.no-data{text-align:center;padding:60px 20px;color:var(--txt-dim)}
.no-data-icon{font-size:40px;margin-bottom:12px}
.no-data-title{font-size:14px;font-weight:500;color:var(--txt-mid);margin-bottom:6px}
.no-data-sub{font-size:12px;font-family:'DM Mono',monospace}

/* mobile */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border2);z-index:100;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.mob-nav-inner{display:flex;justify-content:space-around}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;cursor:pointer;color:var(--txt-dim);font-size:10px;text-decoration:none;font-family:'DM Mono',monospace;transition:color .15s}
.mob-btn.active{color:#a5b4fc}
.mob-icon{font-size:18px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:19;backdrop-filter:blur(4px)}
.sb-overlay.show{display:block}

.cmp-bar{display:flex;align-items:center;gap:10px;padding:10px 20px;background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.18);margin-bottom:16px;flex-wrap:wrap;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%)}
.cmp-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:#a5b4fc;font-family:'DM Mono',monospace;white-space:nowrap}
.cmp-sel{flex:1;min-width:160px;background:var(--s2);border:1px solid rgba(99,102,241,.25);padding:6px 12px;color:var(--txt);font-family:'DM Mono',monospace;font-size:11px;outline:none;cursor:pointer;border-radius:3px}
.cmp-sel option{background:var(--s1)}
.cmp-btn{background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);color:#a5b4fc;padding:6px 16px;font-size:10.5px;cursor:pointer;font-family:'DM Mono',monospace;border-radius:4px;transition:all .15s;font-weight:500}
.cmp-btn:hover{background:rgba(99,102,241,.25)}
.cmp-btn.active{background:rgba(99,102,241,.3);border-color:rgba(99,102,241,.6)}
.cmp-clear{background:transparent;border:1px solid rgba(255,255,255,.1);color:var(--txt-dim);padding:5px 12px;font-size:10px;cursor:pointer;font-family:'DM Mono',monospace;border-radius:4px;transition:all .15s}
.cmp-clear:hover{color:var(--txt)}
/* diff highlights */
.param.diff-changed{background:rgba(245,158,11,.08)!important;border-left:2px solid var(--amber)}
.param.diff-changed .param-lbl::after{content:' ◆';color:var(--amber)}
.param-cmp{font-size:10px;font-family:'DM Mono',monospace;color:var(--txt-dim);margin-top:2px;display:flex;align-items:center;gap:4px}
.param-cmp-arrow{color:var(--amber)}
.param-cmp-val{color:var(--amber);font-weight:500}
.diff-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:var(--amber-d);border:1px solid rgba(245,158,11,.25);font-size:9.5px;font-family:'DM Mono',monospace;color:var(--amber);border-radius:3px;margin-left:auto}

@media(max-width:900px){.sec-body{grid-template-columns:repeat(3,1fr)}.param:nth-child(3n){border-right:none}.param:nth-child(4n){border-right:1px solid rgba(255,255,255,.04)}}
@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;transition:left .3s;z-index:20}
  .sidebar.open{left:0}
  .main{padding-bottom:68px}
  .mob-nav{display:block}
  .topbar{padding:12px 16px}
  .content{padding:12px}
  .sec-body{grid-template-columns:1fr 1fr}
  .param:nth-child(2n){border-right:none}
  .param:nth-child(3n){border-right:1px solid rgba(255,255,255,.04)}
  .param:nth-child(4n){border-right:1px solid rgba(255,255,255,.04)}
  .chip.clock{display:none}
  .cmp-bar{gap:6px}
  .settings-hero{padding:16px 18px}
}
</style>
</head>

<script>

setInterval(()=>{document.getElementById('clockEl').textContent=new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbO').classList.toggle('show')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbO').classList.remove('show')}
async function doLogout(){await sbc.auth.signOut();window.location.replace('login.html')}

async function loadAll(){
  const t0=performance.now();
  let q=sbc.from('ea_settings').select('*').order('created_at',{ascending:false});
  if(!isAdm&&myKey) q=q.eq('license_key',myKey);
  const{data}=await q;
  document.getElementById('latVal').textContent=Math.round(performance.now()-t0);
  document.getElementById('syncLbl').textContent=new Date().toLocaleTimeString('th-TH');
  allSnaps=data||[];
  if(!allSnaps.length){renderEmpty();return;}
  buildSidebar();
  /* auto-select first key */
  const keys=[...new Set(allSnaps.map(r=>r.license_key))];
  curKey=isAdm?keys[0]:myKey;
  selSnap=allSnaps.find(r=>r.license_key===curKey);
  renderAll();
}

function buildSidebar(){
  const keys=isAdm?[...new Set(allSnaps.map(r=>r.license_key))].sort():[myKey];
  let h='';
  keys.forEach(k=>{
    const snaps=allSnaps.filter(r=>r.license_key===k);
    const latest=snaps[0];
    h+=`<div class="acc-item${curKey===k?' active':''}" onclick="selectKey('${k}')">
      <div class="acc-av">${k[0]?.toUpperCase()||'?'}</div>
      <div>
        <div style="font-size:12px">${k}</div>
        <div style="font-size:9.5px;font-family:'DM Mono',monospace;color:var(--txt-dim);margin-top:1px">${snaps.length} snapshot${snaps.length!==1?'s':''}</div>
      </div>
    </div>`;
  });
  document.getElementById('accList').innerHTML=h;
}

function selectKey(k){
  curKey=k;
  const snaps=allSnaps.filter(r=>r.license_key===k);
  selSnap=snaps[0];
  buildSidebar();renderAll();
}

function selectSnap(id){
  selSnap=allSnaps.find(r=>r.id===id);
  if(!selSnap)return;
  /* sync dropdown if exists */
  const dd=document.getElementById('snapDropdown');
  if(dd)dd.value=id;
  renderMain();
}


/* ══ COMPARE MODE ══ */
function toggleCompare(){
  if(cmpKey){clearCompare();return;}
  const sel=document.getElementById('cmpKeySel');
  if(!sel)return;
  const k=sel.value;
  if(k){cmpKey=k;updateCmpSnap();}
  else{alert('กรุณาเลือก key ที่ต้องการเทียบก่อน');}
}

function clearCompare(){
  cmpKey='';cmpSnap=null;
  diff={};
  updateCmpUI();
  const dc=document.getElementById('diffCount');
  if(dc)dc.textContent='0 differences';
  renderMain();
}

function updateCmpSnap(){
  const sel=document.getElementById('cmpKeySel');
  if(!sel)return;
  const k=sel.value||'';
  if(k)cmpKey=k;
  if(!cmpKey){cmpSnap=null;updateCmpUI();renderMain();return;}
  /* populate snapshot dropdown for compare key */
  const snaps=allSnaps.filter(r=>r.license_key===cmpKey).sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
  const ss=document.getElementById('cmpSnapSel');
  if(ss){
    ss.innerHTML='<option value="">— Latest snapshot —</option>'+snaps.map((s,i)=>{
      const dt=new Date(s.created_at).toLocaleString('th-TH',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      return`<option value="${s.id}">${i===0?'[LATEST] ':''}${dt}</option>`;
    }).join('');
  }
  cmpSnap=snaps[0]||null;
  updateCmpUI();
  renderMain();
}

function getCmpSnap(){
  return cmpSnap;
}

/* Compare two setting objects and return diff map */
function buildDiff(base, cmp){
  if(!base||!cmp) return {};
  const diff={};
  const keys=Object.keys(base);
  keys.forEach(k=>{
    if(['id','created_at','license_key'].includes(k)) return;
    const bv=base[k], cv=cmp[k];
    if(bv!==null && cv!==null && bv!==undefined && cv!==undefined){
      const bStr=String(bv), cStr=String(cv);
      if(bStr!==cStr) diff[k]={base:bv, cmp:cv};
    }
  });
  return diff;
}

function renderAll(){
  document.getElementById('pageSub').textContent=curKey+' · INPUT PARAMETERS';
  const snaps=allSnaps.filter(r=>r.license_key===curKey);

  /* ── Snapshot dropdown ── */
  const snapBar=document.getElementById('snapBar');
  if(!snapBar){
    /* First render — build full structure */
    const allKeys=isAdm?[...new Set(allSnaps.map(r=>r.license_key))].sort():[];
    let initHtml=`<div class="snap-bar" id="snapBar">
      <span class="snap-lbl">◈ Snapshot</span>
      <select class="snap-sel" id="snapDropdown" onchange="selectSnap(this.value)"></select>
      <span class="snap-count" id="snapCount"></span>
    </div>`;
    if(isAdm){
      const cmpKeyOpts=allKeys.filter(k=>k!==curKey).map(k=>`<option value="${k}">${k}</option>`).join('');
      initHtml+=`<div class="cmp-bar">
        <span class="cmp-lbl">⇄ Compare with</span>
        <select class="cmp-sel" id="cmpKeySel" onchange="updateCmpSnap()">
          <option value="">— Select key to compare —</option>${cmpKeyOpts}
        </select>
        <select class="cmp-sel" id="cmpSnapSel" style="min-width:180px" onchange="applyCmpSnap()">
          <option value="">— Latest snapshot —</option>
        </select>
        <button class="cmp-btn" id="cmpToggleBtn" onclick="toggleCompare()">Compare</button>
        <button class="cmp-clear" id="cmpClearBtn" onclick="clearCompare()" style="display:none">✕ Clear</button>
        <div class="diff-badge" id="diffCount" style="display:none">0 differences</div>
      </div>`;
    }
    initHtml+='<div id="snapDetail"></div>';
    document.getElementById('mainContent').innerHTML=initHtml;
  }

  /* ── Update snapshot dropdown ── */
  const dd=document.getElementById('snapDropdown');
  const sc=document.getElementById('snapCount');
  if(dd){
    dd.innerHTML=snaps.map((s,i)=>{
      const dt=new Date(s.created_at).toLocaleString('th-TH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
      const sel=selSnap?.id===s.id?'selected':'';
      return`<option value="${s.id}" ${sel}>${i===0?'[LATEST] ':''}${dt} · ${s.symbol||''} ${s.timeframe||''}</option>`;
    }).join('');
  }
  if(sc)sc.textContent=snaps.length+' records';

  /* ── Update cmpKeySel to exclude current key ── */
  const cmpKSel=document.getElementById('cmpKeySel');
  if(cmpKSel&&isAdm){
    const allKeys=[...new Set(allSnaps.map(r=>r.license_key))].sort();
    const prevVal=cmpKSel.value;
    cmpKSel.innerHTML='<option value="">— Select key to compare —</option>'+
      allKeys.filter(k=>k!==curKey).map(k=>`<option value="${k}">${k}</option>`).join('');
    if(prevVal&&prevVal!==curKey)cmpKSel.value=prevVal;
  }

  /* ── Restore compare state in UI ── */
  updateCmpUI();
  renderMain();
}

function updateCmpUI(){
  const btn=document.getElementById('cmpToggleBtn');
  const clr=document.getElementById('cmpClearBtn');
  const dc=document.getElementById('diffCount');
  if(btn){btn.textContent=cmpKey?'🔵 Comparing: '+cmpKey:'Compare';btn.classList.toggle('active',!!cmpKey);}
  if(clr)clr.style.display=cmpKey?'inline-flex':'none';
  if(dc)dc.style.display=cmpKey?'inline-flex':'none';
}

function applyCmpSnap(){
  const ss=document.getElementById('cmpSnapSel');
  const id=ss?.value;
  cmpSnap=id?allSnaps.find(r=>r.id===id):null;
  renderMain();
}

function renderMain(){
  if(!selSnap){return;}
  const s=selSnap;
  const dt=new Date(s.created_at).toLocaleString('th-TH',{year:'numeric',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  /* compute diff with compare snapshot */
  const cmpS=cmpKey?getCmpSnap():null;
  diff=cmpS?buildDiff(s,cmpS):{};
  const diffCount=Object.keys(diff).length;
  const dcEl=document.getElementById('diffCount');
  if(dcEl){dcEl.textContent=diffCount?diffCount+' ค่าต่างกัน':'✓ เหมือนกันทั้งหมด';dcEl.style.background=diffCount?'rgba(245,158,11,.15)':'rgba(16,185,129,.15)';dcEl.style.borderColor=diffCount?'rgba(245,158,11,.3)':'rgba(16,185,129,.3)';dcEl.style.color=diffCount?'var(--amber)':'var(--green)';}

  /* Hero */
  let heroTags='';
  heroTags+=tag(s.use_time_filter,'TIME FILTER');
  heroTags+=tag(s.use_adx_filter,'ADX');
  heroTags+=tag(s.use_rsi_filter,'RSI');
  heroTags+=tag(s.use_trailing,'TRAILING STOP');
  heroTags+=tag(s.use_breakeven,'BREAKEVEN');
  heroTags+=tag(s.use_lot_boost,'LOT BOOST');
  heroTags+=tag(s.use_reverse,'REVERSE MODE');
  heroTags+=tag(s.use_compounding,'COMPOUNDING');
  if(s.delay_mode)heroTags+=`<span class="tag tag-info">${s.delay_mode.replace('DELAY_','')}</span>`;

  let html=`<div class="settings-hero">
    <div class="sh-corner"></div><div class="sh-glow"></div>
    <div class="sh-row">
      <div class="sh-key-block">
        <div class="sh-key">${s.license_key}</div>
        <div class="sh-sym"><span class="sh-sym-dot"></span>${s.symbol||'—'} · ${s.timeframe||'—'} · Magic ${s.magic_number||'—'}</div>
      </div>
      <div style="flex:1"></div>
      <div class="sh-meta">
        <div class="sh-broker">${s.broker||'—'}</div>
        <div class="sh-balance">$${(+s.balance||0).toLocaleString(undefined,{minimumFractionDigits:2})}</div>
        <div class="sh-lever">1:${s.leverage||'—'} leverage · ${dt}</div>
      </div>
    </div>
    <div class="sh-tags">${heroTags}</div>
  </div>`;

  /* Sections */
  html+='<div class="sections">';
  html+=section('📊','Indicator & Signal',[
    param('MA Period',s.trend_ma_period,'val-blue','trend_ma_period'),
    param('MACD Fast',s.macd_fast,'val-blue','macd_fast'),
    param('MACD Slow',s.macd_slow,'val-blue','macd_slow'),
    param('MACD Signal',s.macd_signal,'val-blue','macd_signal'),
    param('ADX Period',s.adx_period,'val-blue','adx_period'),
    param('ADX Threshold',s.adx_threshold,'val-amber','adx_threshold'),
    param('RSI Period',s.rsi_period,'val-blue','rsi_period'),
    param('RSI Overbought',s.rsi_overbought,'val-amber','rsi_overbought'),
    param('RSI Oversold',s.rsi_oversold,'val-blue','rsi_oversold'),
  ],'sec-indicator',true);

  html+=section('⏱️','Signal Delay',[
    param('Delay Mode',(s.delay_mode||'').replace('DELAY_',''),'val-amber','delay_mode'),
    param('Delay Seconds',s.delay_seconds?s.delay_seconds+'s':'—','val-amber','delay_seconds'),
  ],'sec-delay',true);

  html+=section('💰','Money Management',[
    param('Fixed Lot',s.fixed_lot,'val-amber','fixed_lot'),
    param('Compounding',boolVal(s.use_compounding),'','use_compounding'),
    param('Risk %',s.risk_percent?s.risk_percent+'%':'—','val-purple','risk_percent'),
    param('Lot Boost',boolVal(s.use_lot_boost),'','use_lot_boost'),
    param('Boost Lot',s.boost_lot,'val-amber','boost_lot'),
    param('Boost Streak',s.boost_streak,'val-blue','boost_streak'),
    param('Boost Max Trades',s.boost_max_trades,'val-blue','boost_max_trades'),
  ],'sec-mm',true);

  html+=section('🎯','Trade Settings',[
    param('Take Profit',s.takeprofit?s.takeprofit+' pts':'—','val-green','takeprofit'),
    param('Stop Loss',s.stoploss?s.stoploss+' pts':'—','val-red','stoploss'),
    param('Trailing Stop',boolVal(s.use_trailing),'','use_trailing'),
    param('Trailing Start',s.trailing_start?s.trailing_start+' pts':'—','val-amber','trailing_start'),
    param('Trailing Step',s.trailing_step?s.trailing_step+' pts':'—','val-amber','trailing_step'),
    param('Breakeven',boolVal(s.use_breakeven),'','use_breakeven'),
    param('BE Start',s.breakeven_start?s.breakeven_start+' pts':'—','val-amber','breakeven_start'),
    param('BE Offset',s.breakeven_offset?s.breakeven_offset+' pts':'—','val-amber','breakeven_offset'),
  ],'sec-trade',true);

  html+=section('🛡️','Risk Controls',[
    param('Max Spread',s.max_spread?s.max_spread+' pts':'—','val-red','max_spread'),
    param('Daily Profit Target','$'+(s.daily_profit_target||0),'val-green','daily_profit_target'),
    param('Daily Loss Limit','$'+(s.daily_loss_limit||0),'val-red','daily_loss_limit'),
    param('Cooldown Mode',(s.cooldown_mode||'').replace('COOLDOWN_',''),'val-amber','cooldown_mode'),
    param('Cooldown Minutes',s.cooldown_minutes?s.cooldown_minutes+'m':'—','val-amber','cooldown_minutes'),
    param('Reverse Mode',boolVal(s.use_reverse),'','use_reverse'),
    param('Close On Opposite',boolVal(s.close_on_opposite),'','close_on_opposite'),
  ],'sec-risk',true);

  /* Time slots */
  const slots=[s.slot_1,s.slot_2,s.slot_3,s.slot_4,s.slot_5].filter(Boolean);
  if(s.use_time_filter&&slots.length){
    const slotParams=slots.map((sl,i)=>param('Slot '+(i+1),sl,'val-blue','slot_'+(i+1)));
    slotParams.unshift(param('Time Filter',boolVal(s.use_time_filter),'','use_time_filter'));
    html+=section('🕐','Time Filter',slotParams,'sec-time',true);
  }

  /* Color guide */
  html+=`<div class="color-guide">
    <span style="font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-right:4px">Color guide:</span>
    <div class="cg-item"><div class="cg-dot" style="background:var(--blue)"></div>Indicator period / count</div>
    <div class="cg-item"><div class="cg-dot" style="background:var(--amber)"></div>Lot size / risk / time value</div>
    <div class="cg-item"><div class="cg-dot" style="background:var(--green)"></div>Enabled / profit target</div>
    <div class="cg-item"><div class="cg-dot" style="background:var(--red)"></div>Risk limit (SL, Max Spread, Loss Limit)</div>
    <div class="cg-item"><div class="cg-dot" style="background:rgba(245,158,11,.6);border:1px solid rgba(245,158,11,.8)"></div>ค่าที่ต่างจาก key ที่เทียบ</div>
  </div>`;

  html+='</div>';
  document.getElementById('snapDetail').innerHTML=html;

  /* Open all sections */
  document.querySelectorAll('.sec-body').forEach(el=>{el.classList.add('open');});
  document.querySelectorAll('.sec-toggle').forEach(el=>{el.classList.add('open');});
}

function section(icon,title,params,id,open){
  return`<div class="section" id="${id}">
    <div class="sec-hd" onclick="toggleSec('${id}')">
      <span class="sec-icon">${icon}</span>
      <span class="sec-title">${title}</span>
      <span class="sec-count">${params.length} params</span>
      <span class="sec-toggle${open?' open':''}" id="tog-${id}">▾</span>
    </div>
    <div class="sec-body${open?' open':''}">${params.join('')}</div>
  </div>`;
}

function param(lbl,val,cls='',fieldKey=''){
  const display=val===null||val===undefined||val===''?'—':String(val);
  let diffHtml='',diffClass='';
  if(fieldKey&&diff&&diff[fieldKey]){
    const d=diff[fieldKey];
    const cmpDisplay=d.cmp===null||d.cmp===undefined||d.cmp===''?'—':String(d.cmp);
    diffHtml=`<div class="param-cmp-row"><span class="param-cmp-label">${cmpKey}</span><span class="param-cmp-arrow">›</span><span class="param-cmp-val">${cmpDisplay}</span></div>`;
    diffClass=' diff-changed';
  }
  return`<div class="param${diffClass}"><div class="param-lbl">${lbl}</div><div class="param-val ${cls}">${display}</div>${diffHtml}</div>`;
}

function boolVal(v){
  if(v===null||v===undefined)return'—';
  return v?'<span class="val-on">ON ✓</span>':'<span class="val-off">OFF —</span>';
}

function tag(val,label){
  if(val===null||val===undefined)return'';
  return`<span class="tag ${val?'tag-on':'tag-off'}">${label}</span>`;
}

function toggleSec(id){
  const body=document.getElementById(id)?.querySelector('.sec-body');
  const tog=document.getElementById('tog-'+id);
  if(!body)return;
  body.classList.toggle('open');tog?.classList.toggle('open');
}

function renderEmpty(){
  document.getElementById('mainContent').innerHTML=`
    <div class="no-data">
      <div class="no-data-icon">⚙️</div>
      <div class="no-data-title">ยังไม่มี EA Settings</div>
      <div class="no-data-sub">รัน EA ใหม่หลังติดตั้งไฟล์ที่อัพเดตแล้ว<br>ระบบจะส่ง Settings มาอัตโนมัติ</div>
    </div>`;
}
</script>
