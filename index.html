<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARISx | Multi-Account Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #38bdf8; --bg: #030712; --card: #111827; --border: #1f2937; }
        body { background-color: var(--bg); color: #f8fafc; font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid var(--border); padding: 30px 20px; display: flex; flex-column: column; }
        .nav-item { padding: 12px 16px; border-radius: 10px; cursor: pointer; margin-bottom: 8px; transition: 0.3s; color: #94a3b8; font-weight: 500; }
        .nav-item:hover { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        .nav-item.active { background: var(--primary); color: #000; font-weight: 700; }

        /* Main Content */
        .main { flex: 1; padding: 40px; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }
        .account-title { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 24px; border-radius: 20px; position: relative; overflow: hidden; }
        .stat-card::after { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--primary); }
        .stat-label { color: #94a3b8; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 10px; }
        .stat-value { font-size: 30px; font-weight: 700; }

        .chart-box { background: var(--card); border: 1px solid var(--border); padding: 30px; border-radius: 20px; margin-bottom: 30px; height: 450px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 20px; overflow: hidden; border: 1px solid var(--border); }
        th { background: #1f2937; padding: 18px; text-align: left; font-size: 12px; color: #94a3b8; text-transform: uppercase; }
        td { padding: 18px; border-top: 1px solid var(--border); font-size: 14px; }
        .profit { color: #10b981; } .loss { color: #ef4444; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="font-size: 22px; font-weight: 800; color: var(--primary); margin-bottom: 40px;">ARIS<span style="color:#fff">x</span></div>
        <div style="font-size: 12px; color: #4b5563; font-weight: 700; margin-bottom: 15px; text-transform: uppercase;">My Accounts</div>
        <div id="accountList">
            <div class="nav-item active" onclick="switchAccount('All')">Overview (Total)</div>
        </div>
    </div>

    <div class="main">
        <div class="header">
            <div>
                <div style="color: var(--primary); font-size: 14px; font-weight: 600; margin-bottom: 5px;">Trading Performance</div>
                <div id="currentAccountDisplay" class="account-title">Real-time Overview</div>
            </div>
            <div style="background: rgba(16, 185, 129, 0.1); color: #10b981; padding: 8px 20px; border-radius: 100px; font-size: 13px; font-weight: 600; border: 1px solid #10b981;">● System Live</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Net Equity</div>
                <div id="balance" class="stat-value">$0.00</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Executions</div>
                <div id="totalTrades" class="stat-value">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Last Synchronization</div>
                <div id="lastUpdate" class="stat-value" style="font-size: 18px; color: var(--primary);">Syncing...</div>
            </div>
        </div>

        <div class="chart-box">
            <canvas id="equityChart"></canvas>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Time</th>
                    <th>Account</th>
                    <th>Symbol</th>
                    <th>Profit</th>
                    <th>Equity</th>
                </tr>
            </thead>
            <tbody id="historyTable"></tbody>
        </table>
    </div>

    <script>
        const SUB_URL = "https://tfnikhovkbbrhvrkobpu.supabase.co";
        const SUB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo";
        const supabaseClient = supabase.createClient(SUB_URL, SUB_KEY);
        let currentAccount = "All";
        let chartInstance = null;

        async function loadData() {
            let query = supabaseClient.from('trade_history').select('*').order('created_at', { ascending: true });
            
            // ถ้าเลือกบัญชีเฉพาะ ให้กรองข้อมูล (สมมติว่าคุณมีคอลัมน์ account_name ใน Supabase)
            if (currentAccount !== "All") {
                query = query.eq('account_name', currentAccount);
            }

            const { data, error } = await supabaseClient.from('trade_history').select('*').order('created_at', { ascending: true });
            if (error || !data || data.length === 0) return;

            // กรองข้อมูลในฝั่ง Client เพื่อความเร็ว (ถ้ายังไม่ได้แก้ DB)
            const filteredData = currentAccount === "All" ? data : data.filter(d => d.account_name === currentAccount);
            if (filteredData.length === 0) return;

            const last = filteredData[filteredData.length - 1];
            document.getElementById('balance').innerText = "$" + last.account_balance.toLocaleString(undefined, {minimumFractionDigits: 2});
            document.getElementById('totalTrades').innerText = filteredData.length;
            document.getElementById('lastUpdate').innerText = new Date(last.created_at).toLocaleTimeString();

            updateChart(filteredData);
            updateTable(filteredData);
            updateAccountList(data);
        }

        function updateChart(data) {
            const ctx = document.getElementById('equityChart').getContext('2d');
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, 'rgba(56, 189, 248, 0.2)');
            gradient.addColorStop(1, 'rgba(56, 189, 248, 0)');

            if (chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: data.map((_, i) => i + 1),
                    datasets: [{
                        data: data.map(d => d.account_balance),
                        borderColor: '#38bdf8',
                        borderWidth: 3,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: gradient,
                        tension: 0.4
                    }]
                },
                options: { 
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { grid: { display: false }, ticks: { color: '#4b5563' } },
                        y: { grid: { color: '#1f2937' }, ticks: { color: '#4b5563' } }
                    }
                }
            });
        }

        function updateTable(data) {
            const html = data.slice().reverse().map(row => `
                <tr>
                    <td>${new Date(row.created_at).toLocaleString()}</td>
                    <td style="font-weight:700">${row.account_name || 'Main'}</td>
                    <td>${row.symbol || 'XAUUSD'}</td>
                    <td class="${row.profit >= 0 ? 'profit' : 'loss'}">${row.profit >= 0 ? '+' : ''}${row.profit}</td>
                    <td>$${row.account_balance.toLocaleString()}</td>
                </tr>
            `).join('');
            document.getElementById('historyTable').innerHTML = html;
        }

        function updateAccountList(data) {
            const accounts = [...new Set(data.map(d => d.account_name || 'Main Account'))];
            const listHtml = `<div class="nav-item ${currentAccount === 'All' ? 'active' : ''}" onclick="switchAccount('All')">Overview (Total)</div>` + 
                accounts.map(acc => `<div class="nav-item ${currentAccount === acc ? 'active' : ''}" onclick="switchAccount('${acc}')">${acc}</div>`).join('');
            document.getElementById('accountList').innerHTML = listHtml;
        }

        function switchAccount(acc) {
            currentAccount = acc;
            document.getElementById('currentAccountDisplay').innerText = acc === 'All' ? 'Real-time Overview' : acc;
            loadData();
        }

        loadData();
        setInterval(loadData, 30000);
    </script>
</body>
</html>
