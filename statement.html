<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{overflow-x:hidden;max-width:100vw}
body{visibility:hidden;opacity:0}
:root{
  --bg:#060608;--s1:#0c0e14;--s2:#111420;--s3:#161926;
  --purple:#6366f1;--purple-d:rgba(99,102,241,.12);--purple-g:rgba(99,102,241,.28);
  --green:#10b981;--green-d:rgba(16,185,129,.1);
  --red:#f43f5e;--red-d:rgba(244,63,94,.1);
  --amber:#f59e0b;--amber-d:rgba(245,158,11,.1);
  --blue:#38bdf8;--blue-d:rgba(56,189,248,.1);
  --border2:rgba(255,255,255,.04);
  --txt:#f1f5f9;--txt-mid:#94a3b8;--txt-dim:#475569;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;display:flex;height:100vh;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.009) 2px,rgba(255,255,255,.009) 4px);pointer-events:none;z-index:0}

.sidebar{width:260px;min-width:260px;background:var(--s1);border-right:1px solid var(--border2);display:flex;flex-direction:column;position:relative;z-index:20;overflow:hidden}
.sidebar::after{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--purple-g),transparent)}
.sb-top{padding:28px 22px 20px;border-bottom:1px solid var(--border2)}
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.logo-mark{width:34px;height:34px;background:linear-gradient(135deg,var(--purple),#8b5cf6);clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0}
.logo-name{font-size:19px;font-weight:600;color:#fff;letter-spacing:-.3px}
.logo-sub{font-size:9.5px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;margin-top:1px}
.live-pill{display:flex;align-items:center;gap:6px;margin-top:14px;padding:6px 12px;background:var(--green-d);border:1px solid rgba(16,185,129,.18);font-size:10px;font-family:'DM Mono',monospace;color:var(--green);letter-spacing:.5px;clip-path:polygon(8px 0,100% 0,calc(100% - 8px) 100%,0 100%)}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:ping 1.5s ease infinite}
@keyframes ping{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.sb-nav{padding:18px 14px 8px}
.nav-sect{font-size:9px;letter-spacing:2.5px;color:var(--txt-dim);text-transform:uppercase;font-family:'DM Mono',monospace;padding:0 8px;margin-bottom:8px}
.nav-btn{display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;transition:all .15s;color:var(--txt-dim);font-size:13px;font-weight:500;text-decoration:none;border:1px solid transparent;margin-bottom:2px;position:relative;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.nav-btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--purple);transform:scaleY(0);transition:transform .15s}
.nav-btn:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.nav-btn.active{background:var(--purple-d);color:#a5b4fc;border-color:rgba(99,102,241,.18)}
.nav-btn.active::before{transform:scaleY(1)}
.nav-icon{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-foot{padding:14px 22px;border-top:1px solid var(--border2);margin-top:auto}
.lat-row{display:flex;align-items:center;gap:6px;font-size:10px;font-family:'DM Mono',monospace;color:var(--txt-dim)}
.lat-v{color:var(--blue);font-weight:500}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;z-index:5}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 36px;border-bottom:1px solid var(--border2);background:rgba(6,6,8,.92);backdrop-filter:blur(16px);flex-shrink:0;position:relative;z-index:10}
.topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.28),transparent)}
.page-title{font-size:20px;font-weight:600;color:#fff;letter-spacing:-.3px}
.page-sub{font-size:10px;color:var(--txt-dim);margin-top:2px;font-family:'DM Mono',monospace}
.topbar-r{display:flex;align-items:center;gap:8px}
.chip{background:var(--s2);border:1px solid var(--border2);padding:6px 12px;font-size:11px;font-family:'DM Mono',monospace;color:var(--txt-mid);clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);text-decoration:none;transition:all .15s;cursor:pointer}
.chip:hover{border-color:rgba(255,255,255,.1);color:var(--txt)}
.logout-chip{background:var(--red-d);border-color:rgba(244,63,94,.2);color:var(--red)}
.admin-chip{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.06));border-color:rgba(245,158,11,.4);color:var(--amber);font-weight:600;animation:ag 2s ease-in-out infinite alternate}
@keyframes ag{0%{box-shadow:0 0 6px rgba(245,158,11,.1)}100%{box-shadow:0 0 18px rgba(245,158,11,.25)}}
.content{flex:1;overflow-y:auto;padding:24px 36px}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:rgba(99,102,241,.2)}

/* USER INFO CARD */
.user-card{background:rgba(255,255,255,.025);border:1px solid rgba(99,102,241,.18);padding:22px 28px;margin-bottom:20px;position:relative;clip-path:polygon(0 0,calc(100% - 18px) 0,100% 18px,100% 100%,0 100%);display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.user-corner{position:absolute;top:0;right:0;width:18px;height:18px;background:var(--purple-d);clip-path:polygon(0 0,100% 100%,100% 0)}
.user-av{width:52px;height:52px;background:linear-gradient(135deg,var(--purple),#8b5cf6);clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#fff;font-family:'DM Mono',monospace;flex-shrink:0}
.user-info-name{font-size:18px;font-weight:600;color:#fff;letter-spacing:-.2px}
.user-info-key{font-size:11px;color:#a5b4fc;font-family:'DM Mono',monospace;margin-top:2px;letter-spacing:.5px}
.user-info-email{font-size:11px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:2px}
.user-stats{margin-left:auto;display:flex;gap:24px}
.us-item .us-lbl{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-bottom:3px}
.us-item .us-val{font-size:16px;font-weight:500;font-family:'DM Mono',monospace}

/* PENDING BADGE */
.pending-banner{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--amber-d);border:1px solid rgba(245,158,11,.25);margin-bottom:20px;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,0 100%);flex-wrap:wrap;gap:10px}
.pb-left{display:flex;align-items:center;gap:10px}
.pb-icon{font-size:20px}
.pb-title{font-size:13px;font-weight:600;color:var(--amber)}
.pb-sub{font-size:10.5px;color:rgba(245,158,11,.7);font-family:'DM Mono',monospace;margin-top:1px}
.pb-amount{font-size:22px;font-weight:600;font-family:'DM Mono',monospace;color:var(--amber)}

/* STATEMENT ITEMS */
.stmt-list{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.stmt-card{background:rgba(255,255,255,.022);border:1px solid var(--border2);position:relative;clip-path:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);overflow:hidden;transition:border-color .2s}
.stmt-card:hover{border-color:rgba(255,255,255,.08)}
.stmt-card.pending-card{border-color:rgba(245,158,11,.2)}
.stmt-card.paid-card{border-color:rgba(16,185,129,.15)}
.sc-corner2{position:absolute;top:0;right:0;width:14px;height:14px;clip-path:polygon(0 0,100% 100%,100% 0)}
.pending-card .sc-corner2{background:rgba(245,158,11,.3)}
.paid-card .sc-corner2{background:rgba(16,185,129,.25)}
.stmt-stripe{position:absolute;left:0;top:0;bottom:0;width:3px}
.pending-card .stmt-stripe{background:linear-gradient(to bottom,transparent,var(--amber),transparent)}
.paid-card .stmt-stripe{background:linear-gradient(to bottom,transparent,var(--green),transparent)}
.stmt-inner{padding:18px 22px 18px 26px}
.stmt-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.stmt-period{font-size:14px;font-weight:600;color:#fff;letter-spacing:-.2px}
.stmt-range{font-size:10px;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-top:2px}
.stmt-fee{text-align:right}
.stmt-fee-usd{font-size:26px;font-weight:600;font-family:'DM Mono',monospace;line-height:1}
.pending-card .stmt-fee-usd{color:var(--amber)}
.paid-card .stmt-fee-usd{color:var(--green)}
.stmt-fee-thb{font-size:13px;font-family:'DM Mono',monospace;margin-top:2px}
.pending-card .stmt-fee-thb{color:rgba(245,158,11,.6)}
.paid-card .stmt-fee-thb{color:rgba(16,185,129,.6)}
.stmt-status{display:inline-flex;padding:3px 12px;font-size:10px;font-weight:500;font-family:'DM Mono',monospace;clip-path:polygon(4px 0,100% 0,calc(100% - 4px) 100%,0 100%)}
.badge-pending{background:var(--amber-d);border:1px solid rgba(245,158,11,.25);color:var(--amber)}
.badge-paid{background:var(--green-d);border:1px solid rgba(16,185,129,.2);color:var(--green)}
.stmt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding-top:12px;border-top:1px solid var(--border2)}
.sg-item .sg-lbl{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt-dim);font-family:'DM Mono',monospace;margin-bottom:3px}
.sg-item .sg-val{font-size:13px;font-weight:500;font-family:'DM Mono',monospace;color:var(--txt)}

/* EMPTY STATE */
.empty-state{text-align:center;padding:60px 20px;color:var(--txt-dim)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:14px;font-weight:500;color:var(--txt-mid);margin-bottom:6px}
.empty-sub{font-size:12px;font-family:'DM Mono',monospace}

/* MOB NAV */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--s1);border-top:1px solid var(--border2);z-index:100;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.mob-nav-inner{display:flex;justify-content:space-around}
.mob-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 14px;cursor:pointer;color:var(--txt-dim);font-size:10px;text-decoration:none;font-family:'DM Mono',monospace;transition:color .15s}
.mob-btn.active{color:#a5b4fc}
.mob-icon{font-size:18px}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:19;backdrop-filter:blur(4px)}
.sb-overlay.show{display:block}

@media(max-width:768px){
  .sidebar{position:fixed;left:-260px;top:0;bottom:0;transition:left .3s;z-index:20}
  .sidebar.open{left:0}
  .main{padding-bottom:68px}
  .mob-nav{display:block}
  .topbar{padding:14px 16px}
  .content{padding:14px}
  .user-stats{gap:14px}
  .stmt-grid{grid-template-columns:1fr 1fr}
  .chip.clock{display:none}
}
</style>
</head>

    <a class="mob-btn active" href="statement.html"><div class="mob-icon">💰</div>Statement</a>
    <div class="mob-btn" onclick="toggleSb()"><div class="mob-icon">☰</div>Menu</div>
  </div>
</div>

<script>
const MONTHS=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
let myKey='',myName='',myEmail='';

(async()=>{
  const{data:{session}}=await sbc.auth.getSession();
  if(!session){window.location.replace('login.html');return;}
  myEmail=session.user.email;
  /* get license key */
  const{data:lk}=await sbc.from('license_keys').select('*').eq('user_id',session.user.id).single();
  if(!lk){window.location.replace('index.html');return;}
  myKey=lk.license_key;myName=lk.display_name||myKey;
  document.getElementById('userKey').textContent=myKey;
  document.getElementById('pageSub').textContent=myKey+' · REVENUE SHARE';
  if(lk.is_admin){['adminNav','adminTopBtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.display='flex'});}
  document.body.style.visibility='visible';document.body.style.opacity='1';
  loadStatement();
})();

/* ══ AUTH GUARD ══ */
(async()=>{
  try{
    const _sb=supabase.createClient("https://tfnikhovkbbrhvrkobpu.supabase.co","eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRmbmlraG92a2Jicmh2cmtvYnB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NjQ0MjAsImV4cCI6MjA5MDM0MDQyMH0.hHHhXvLBBQfag3Rcf3pNC04NBlu17CSgi1sec3wysJo");
    const{data:{session}}=await _sb.auth.getSession();
    if(!session){window.location.replace('login.html');return;}
    const{data:lk}=await _sb.from('license_keys').select('license_key,is_admin,display_name').eq('user_id',session.user.id).single();
    if(!lk){window.location.replace('login.html');return;}
    window._isAdmin=lk.is_admin||false;
    window._myLicenseKey=lk.license_key||'';
    window._displayName=lk.display_name||lk.license_key||'';
    window._userId=session.user.id;
    window._userEmail=session.user.email;
    try{
      const{data:md}=await _sb.from('menu_settings').select('page_key,is_visible');
      window._menuVis={};
      if(md)md.forEach(m=>window._menuVis[m.page_key]=m.is_visible);
      if(!lk.is_admin&&window._menuVis['statement']===false){window.location.replace('index.html');return;}
    }catch(e){}
    if(lk.is_admin)document.querySelectorAll('#adminNav,#adminTopBtn').forEach(el=>{if(el)el.style.display='flex';});
    const ea=document.getElementById('nav-ea-settings');if(ea)ea.style.display=lk.is_admin?'flex':'none';
    document.body.style.visibility='visible';document.body.style.opacity='1';
    const uc=document.getElementById('userChip');if(uc)uc.textContent=window._displayName||'';
    loadStatement();
  }catch(err){console.error('Auth:',err);window.location.replace('login.html');}
})();

setInterval(()=>{document.getElementById('clockEl').textContent=new Date().toLocaleString('th-TH',{timeZone:'Asia/Bangkok',hour12:false,year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'})},1000);
function toggleSb(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sbO').classList.toggle('show')}
function closeSb(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sbO').classList.remove('show')}
async function doLogout(){await sbc.auth.signOut();window.location.replace('login.html')}

async function loadStatement(){
  /* get revenue_share records */
  const{data:rs}=await sbc.from('revenue_share').select('*').eq('license_key',myKey).order('created_at',{ascending:false});
  /* get trade stats */
  const{data:trades}=await sbc.from('trade_history').select('profit,account_balance').eq('license_key',myKey).eq('trade_action','CLOSE');

  /* compute totals */
  const allPNL=trades?trades.reduce((a,r)=>a+(+r.profit||0),0):0;
  const allWins=trades?trades.filter(r=>(+r.profit||0)>0).length:0;
  const allWR=trades?.length?Math.round(allWins/trades.length*100):0;
  const latBal=trades?.length?(+trades[trades.length-1].account_balance||0):0;
  const pendingFee=rs?rs.filter(r=>r.status==='pending').reduce((a,r)=>a+(+r.fee_thb||0),0):0;

  /* build user card */
  const initials=myName.substring(0,2).toUpperCase();
  let html=`
  <div class="user-card">
    <div class="user-corner"></div>
    <div class="user-av">${initials}</div>
    <div>
      <div class="user-info-name">${myName}</div>
      <div class="user-info-key">◈ ${myKey}</div>
      <div class="user-info-email">${myEmail}</div>
    </div>
    <div class="user-stats">
      <div class="us-item"><div class="us-lbl">Net P/L</div><div class="us-val" style="color:${allPNL>=0?'var(--green)':'var(--red)'}">${allPNL>=0?'+$':'-$'}${Math.abs(allPNL).toFixed(2)}</div></div>
      <div class="us-item"><div class="us-lbl">Win Rate</div><div class="us-val" style="color:${allWR>=60?'var(--green)':allWR>=40?'var(--amber)':'var(--red)'}">${trades?.length?allWR+'%':'—'}</div></div>
      <div class="us-item"><div class="us-lbl">Balance</div><div class="us-val" style="color:#a5b4fc">$${latBal.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
    </div>
  </div>`;

  /* pending banner */
  if(pendingFee>0){
    html+=`<div class="pending-banner">
      <div class="pb-left"><div class="pb-icon">⚠</div><div><div class="pb-title">มียอดค้างชำระ</div><div class="pb-sub">กรุณาติดต่อผู้ดูแลเพื่อชำระค่าบริการ</div></div></div>
      <div class="pb-amount">฿${pendingFee.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
    </div>`;
  }

  /* statement list */
  if(!rs||!rs.length){
    html+=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-title">ยังไม่มี Statement</div><div class="empty-sub">ยอดจะแสดงเมื่อ Admin คำนวณ Revenue Share</div></div>`;
  } else {
    html+='<div class="stmt-list">';
    rs.forEach(r=>{
      const isPending=r.status==='pending';
      const ps=new Date(r.period_start),pe=new Date(r.period_end);
      const periodStr=ps.getDate()+' '+MONTHS[ps.getMonth()]+' – '+pe.getDate()+' '+MONTHS[pe.getMonth()]+' '+(pe.getFullYear()+543);
      const gp=+r.gross_profit||0,fee=+r.fee_usd||0,thb=+r.fee_thb||0,rate=+r.usd_thb_rate||36,pct=+r.percent||0;
      html+=`<div class="stmt-card ${isPending?'pending-card':'paid-card'}">
        <div class="stmt-stripe"></div>
        <div class="sc-corner2"></div>
        <div class="stmt-inner">
          <div class="stmt-hd">
            <div>
              <div class="stmt-period">${periodStr}</div>
              <div class="stmt-range" style="margin-top:6px"><span class="${isPending?'badge-pending':'badge-paid'} stmt-status">${isPending?'รอชำระ':'ชำระแล้ว'}</span></div>
            </div>
            <div class="stmt-fee">
              <div class="stmt-fee-usd">$${fee.toFixed(2)}</div>
              <div class="stmt-fee-thb">≈ ฿${thb.toLocaleString(undefined,{minimumFractionDigits:2})}</div>
            </div>
          </div>
          <div class="stmt-grid">
            <div class="sg-item"><div class="sg-lbl">Gross Profit</div><div class="sg-val" style="color:var(--green)">+$${gp.toFixed(2)}</div></div>
            <div class="sg-item"><div class="sg-lbl">Fee Rate</div><div class="sg-val" style="color:var(--amber)">${pct}%</div></div>
            <div class="sg-item"><div class="sg-lbl">USD Rate</div><div class="sg-val" style="color:var(--blue)">฿${rate}</div></div>
            <div class="sg-item"><div class="sg-lbl">Created</div><div class="sg-val" style="font-size:11px;color:var(--txt-dim)">${new Date(r.created_at).toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'})}</div></div>
          </div>
        </div>
      </div>`;
    });
    html+='</div>';
  }

  document.getElementById('mainContent').innerHTML=html;
}
</script>
</body>
</html>
